<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Letras Cloud - Repertorio Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1DB954;
            --bg: #121212;
            --card: rgba(30, 30, 30, 0.98);
            --text: #ffffff;
            --accent: #b3b3b3;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.9)), 
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM1NTUiIGZpbGwtb3BhY2l0eT0iMC4yIj48cGF0aCBkPSJNMCAwaDIwdjIwaC0yMFYwem0yMCAyMGgyMHYyMGgtMjBWMjB6TTAgMjBoMjB2MjBoLTIwVjIwem0yMCAwaDIwdjIwaC0yMFYwek0wIDBoMTB2MTBIMFYwek0xMCAxMGgxMHYxMEgxMFYxMHpNMjAgMjBoMTB2MTBIMjBWMjB6TTMwIDMwaDEwdjEwSDMwVjMwek0wIDIwaDEwdjEwSDBWMjB6TTEwIDMwaDEwdjEwSDEwVjMwek0yMCAwIGgxMHYxMEgyMFYwek0zMCAxMGgxMHYxMEgzMFYxMHpNMzAgMjB2NWg1VjIwSDMwRHpNMzAgMzBoNXY1SDMwVjMwek0zNSAyNWg1djVISDM1VjI1eiIvPjwvZz48L2c+PC9zdmc+');
            color: var(--text);
            margin: 0; padding: 0;
        }
        
        .tabs {
            display: flex;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            justify-content: center;
            border-bottom: 2px solid var(--primary);
        }
        .tab-btn {
            padding: 15px 20px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Estilos del Formulario */
        .input-group {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select, input, textarea {
            background: #282828; color: white; border: 1px solid #444;
            padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box;
        }
        .btn-save {
            background: var(--primary); color: black; font-weight: bold;
            padding: 18px; border: none; border-radius: 8px; width: 100%;
            cursor: pointer; font-size: 16px; margin-top: 10px;
        }

        /* Listas de canciones */
        .cancion-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }
        .cancion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { background: #444; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--primary); font-weight: bold; }
        
        .columnas-view { display: flex; gap: 20px; flex-wrap: wrap; }
        .columna { flex: 1; min-width: 300px; }
        .letra-box { 
            white-space: pre-wrap; font-family: 'Courier New', monospace; 
            font-size: 14px; color: #ccc; line-height: 1.6;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;
            border: 1px solid #333;
        }
        .label-col { font-size: 11px; text-transform: uppercase; color: var(--primary); margin-bottom: 8px; font-weight: bold; letter-spacing: 1px;}

        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr; } .columna { min-width: 100%; } }
    </style>
</head>
<body>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'nuevo')">➕ GUARDAR</button>
        <button class="tab-btn" onclick="openTab(event, 'lentas')">🐢 LENTAS</button>
        <button class="tab-btn" onclick="openTab(event, 'rapidas')">⚡ RÁPIDAS</button>
    </nav>

    <div class="container">
        
        <section id="nuevo" class="content-section active">
            <div class="input-group">
                <h2 style="color:var(--primary); margin-top:0;">Nuevo Registro Musical</h2>
                <div class="form-grid">
                    <input type="text" id="titulo" placeholder="Título de la canción...">
                    <select id="velocidad">
                        <option value="lenta">Ritmo: Lenta</option>
                        <option value="rapida">Ritmo: Rápida</option>
                    </select>
                    <select id="nota">
                        <option value="C">Nota: C</option><option value="D">Nota: D</option>
                        <option value="E">Nota: E</option><option value="F">Nota: F</option>
                        <option value="G">Nota: G</option><option value="A">Nota: A</option>
                        <option value="B">Nota: B</option>
                    </select>
                    <select id="tipoTono">
                        <option value="Mayor">Mayor</option>
                        <option value="Menor">Menor</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <textarea id="letraVoces" rows="12" placeholder="Letra Voces... (Opcional)"></textarea>
                    <textarea id="letraNota" rows="12" placeholder="Letra con Nota Original... (Opcional)"></textarea>
                </div>
                <button class="btn-save" onclick="guardarLetra()">GUARDAR CANCIÓN</button>
            </div>
        </section>

        <section id="lentas" class="content-section">
            <h2 style="text-align:center; color:var(--accent);">🐢 REPERTORIO LENTAS</h2>
            <div id="lista-lentas"></div>
        </section>

        <section id="rapidas" class="content-section">
            <h2 style="text-align:center; color:var(--accent);">⚡ REPERTORIO RÁPIDAS</h2>
            <div id="lista-rapidas"></div>
        </section>

    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openTab(evt, sectionName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("content-section");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].className = tabcontent[i].className.replace(" active", ""); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
            document.getElementById(sectionName).className += " active";
            evt.currentTarget.className += " active";
        }

        function guardarLetra() {
            const t = document.getElementById('titulo').value;
            const lv = document.getElementById('letraVoces').value;
            const ln = document.getElementById('letraNota').value;
            const v = document.getElementById('velocidad').value;
            const nota = document.getElementById('nota').value;
            const tipo = document.getElementById('tipoTono').value;

            if (t) {
                database.ref('canciones').push().set({
                    nombre: t,
                    letraVoces: lv,
                    letraNota: ln,
                    velocidad: v,
                    tonoCompleto: `${nota} ${tipo}`,
                    timestamp: Date.now()
                }).then(() => {
                    alert("¡Canción guardada con éxito!");
                    document.getElementById('titulo').value = '';
                    document.getElementById('letraVoces').value = '';
                    document.getElementById('letraNota').value = '';
                });
            } else { alert("El título es obligatorio."); }
        }

        database.ref('canciones').on('value', (snapshot) => {
            const listLentas = document.getElementById('lista-lentas');
            const listRapidas = document.getElementById('lista-rapidas');
            listLentas.innerHTML = ''; listRapidas.innerHTML = '';
            
            let canciones = [];
            snapshot.forEach(child => { canciones.push(child.val()); });
            canciones.reverse();

            canciones.forEach(item => {
                // Lógica para NO mostrar columnas vacías
                let columnaVoces = item.letraVoces ? `
                    <div class="columna">
                        <div class="label-col">Letra Voces</div>
                        <div class="letra-box">${item.letraVoces}</div>
                    </div>` : '';

                let columnaNota = item.letraNota ? `
                    <div class="columna">
                        <div class="label-col">Letra con Nota Original</div>
                        <div class="letra-box">${item.letraNota}</div>
                    </div>` : '';

                const html = `
                    <div class="cancion-card">
                        <div class="cancion-header">
                            <h3 style="margin:0; color:var(--primary);">${item.nombre}</h3>
                            <span class="badge">${item.tonoCompleto}</span>
                        </div>
                        <div class="columnas-view">
                            ${columnaVoces}
                            ${columnaNota}
                        </div>
                    </div>
                `;
                if (item.velocidad === 'rapida') { listRapidas.insertAdjacentHTML('beforeend', html); }
                else { listLentas.insertAdjacentHTML('beforeend', html); }
            });
        });
    </script>
</body>
</html>
