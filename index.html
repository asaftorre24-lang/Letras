<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Letras Cloud - Google Style</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1DB954;
            --bg: #202124; /* El gris oscuro oficial de Google Dark */
            --search-bg: #303134;
            --text: #e8eaed;
        }
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Barra de navegación superior */
        .tabs {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
        }
        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.8;
        }
        .tab-btn:hover { text-decoration: underline; opacity: 1; }
        .tab-btn.active { color: var(--primary); font-weight: bold; }

        .main-search-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -50px;
        }

        .logo {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }

        /* El Buscador Estilo Google */
        .search-box {
            background: var(--search-bg);
            border: 1px solid #5f6368;
            border-radius: 24px;
            width: 90%;
            max-width: 584px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            transition: box-shadow 0.2s;
        }
        .search-box:hover, .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(0,0,0,0.28);
            background: #3c4043;
        }
        .search-box input {
            background: none;
            border: none;
            color: white;
            flex: 1;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .buttons-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .g-btn {
            background: #303134;
            border: 1px solid #303134;
            color: #e8eaed;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .g-btn:hover { border: 1px solid #5f6368; }

        /* Contenedor de Listas */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Formulario de Registro (Estilo Card Limpia) */
        .register-card {
            background: #28292c;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #3c4043;
        }

        /* Acordeones y Grid (Mantenemos tu funcionalidad de 2 columnas) */
        .view-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }
        .letra-box {
            background: #171717;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #333;
        }

        @media (max-width: 600px) { .view-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'inicio')">Inicio</button>
        <button class="tab-btn" onclick="openTab(event, 'nuevo')">Registrar</button>
        <button class="tab-btn" onclick="openTab(event, 'lentas')">Lentas</button>
        <button class="tab-btn" onclick="openTab(event, 'rapidas')">Rápidas</button>
    </nav>

    <section id="inicio" class="content-section active">
        <div class="main-search-container">
            <div class="logo">
                <span>L</span><span>e</span><span>t</span><span>r</span><span>a</span><span>s</span>
            </div>
            <div class="search-box">
                <span style="opacity: 0.5;">🔍</span>
                <input type="text" id="mainSearch" placeholder="Busca una canción en tu repertorio..." onkeyup="buscarCancion()">
            </div>
            <div class="buttons-group">
                <button class="g-btn" onclick="document.querySelector('[onclick*=\'lentas\']').click()">Buscar en Lentas</button>
                <button class="g-btn" onclick="document.querySelector('[onclick*=\'rapidas\']').click()">Buscar en Rápidas</button>
            </div>
        </div>
    </section>

    <section id="nuevo" class="content-section">
        <div class="container">
            <div class="register-card">
                <h2 style="text-align:center; margin-top:0;">Añadir al Repertorio</h2>
                <input type="text" id="titulo" placeholder="Nombre de la canción" style="margin-bottom:15px; padding:15px; background:#3c4043; border:none; color:white; width:100%; border-radius:8px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <textarea id="letraVoces" rows="15" placeholder="Letra Voces (Izquierda)" style="background:#1a1a1a; color:white; border:1px solid #333; padding:10px; border-radius:8px;"></textarea>
                    <textarea id="letraNota" rows="15" placeholder="Letra con Acordes (Derecha)" style="background:#1a1a1a; color:white; border:1px solid #333; padding:10px; border-radius:8px;"></textarea>
                </div>
                <button onclick="guardarLetra()" style="width:100%; padding:15px; background:var(--primary); color:black; font-weight:bold; border:none; border-radius:8px; margin-top:15px; cursor:pointer;">GUARDAR CANCIÓN</button>
            </div>
        </div>
    </section>

    <section id="lentas" class="content-section">
        <div class="container" id="lista-lentas"></div>
    </section>

    <section id="rapidas" class="content-section">
        <div class="container" id="lista-rapidas"></div>
    </section>

    <script>
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openTab(evt, sectionName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("content-section");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(sectionName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        function guardarLetra() {
            const t = document.getElementById('titulo').value;
            const lv = document.getElementById('letraVoces').value;
            const ln = document.getElementById('letraNota').value;
            if (t) {
                database.ref('canciones').push().set({
                    nombre: t,
                    letraVoces: lv || "",
                    letraNota: ln || "",
                    velocidad: "lenta" // Por defecto, puedes cambiarlo
                }).then(() => {
                    alert("¡Guardada!");
                    location.reload();
                });
            }
        }

        database.ref('canciones').on('value', (snapshot) => {
            // Aquí va tu lógica de renderizado que ya tenemos, 
            // solo asegúrate de que use las dos columnas.
        });

        function buscarCancion() {
            // Lógica para filtrar mientras escribes en el buscador central
        }
    </script>
</body>
</html>
