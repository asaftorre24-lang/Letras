<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consola de Guía Vocal</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #indicador-estado {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #1e1e1e;
            transition: color 0.5s ease;
        }

        .contenedor-columnas {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .columna {
            flex: 1;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h2 {
            font-size: 16px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #444;
        }

        pre {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap; /* Mantiene el formato pero ajusta al ancho */
        }

        /* Colores específicos */
        .voces-titulo { color: #ffffff; }
        .notas-titulo { color: #90CAF9; }
        .notas-texto { color: #90CAF9; }

        .controles {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="indicador-estado">ESPERANDO VALOR...</div>

    <div class="contenedor-columnas">
        <div class="columna">
            <h2 class="voces-titulo">LETRA PARA VOCES</h2>
            <pre id="contenido-voces">
Quiero que sepas que mi amor no se acaba...
Sigo esperando que vuelvas a mi lado.
            </pre>
        </div>

        <div class="columna">
            <h2 class="notas-titulo">LETRA CON NOTAS ORIGINALES</h2>
            <pre id="contenido-notas" class="notas-texto">
[RE] Quiero que sepas que mi [LA] amor no se acaba...
[SOL] Sigo esperando que [LA] vuelvas a mi [RE] lado.
            </pre>
        </div>
    </div>

    <div class="controles">
        <input type="number" id="valor-entrada" value="85" style="padding: 10px; width: 60px;">
        <button onclick="actualizarEstado()">Actualizar Estado</button>
    </div>

    <script>
        function actualizarEstado() {
            const valor = document.getElementById('valor-entrada').value;
            const indicador = document.getElementById('indicador-estado');

            // Lógica de colores corregida (Verde primero para prioridad)
            if (valor >= 80) {
                indicador.innerText = "ESTADO: ÓPTIMO (VERDE)";
                indicador.style.color = "#00FF00";
            } else if (valor >= 50) {
                indicador.innerText = "ESTADO: ADVERTENCIA (AMARILLO)";
                indicador.style.color = "#FFFF00";
            } else {
                indicador.innerText = "ESTADO: CRÍTICO (ROJO)";
                indicador.style.color = "#FF0000";
            }
        }

        // Ejecutar al cargar
        window.onload = actualizarEstado;
    </script>
</body>
</html>
