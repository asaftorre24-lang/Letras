<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras Repertorio 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4285F4; 
            --bg-base: #1e1e1e; 
            --card-bg: rgba(30, 30, 30, 0.95);
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border: #333333;
            --secondary: #34A853; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { width: 100%; text-align: center; padding: 20px 0; background: #000; position: relative; }
        .google-logo { font-size: 40px; font-weight: bold; }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #DB4437; }
        .google-logo span:nth-child(3) { color: #F4B400; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #DB4437; }

        .admin-trigger { position: absolute; right: 15px; top: 25px; background: none; border: 1px solid #333; color: #555; border-radius: 5px; padding: 5px; font-size: 10px; cursor: pointer; }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        .search-box { width: 100%; margin: 10px 0 25px 0; position: relative; }
        .search-box input { width: 100%; padding: 14px 14px 14px 45px; border-radius: 30px; border: 1px solid #555; background: #222; color: white; outline: none; }
        .search-box::before { content: '🔍'; position: absolute; left: 15px; top: 12px; font-size: 18px; opacity: 0.5; }

        .filtros { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .filter-btn { padding: 10px 25px; border-radius: 25px; border: 1px solid var(--border); background: var(--card-bg); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        .tono-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; background: rgba(24, 24, 24, 0.8); }
        .tono-header { padding: 18px; display: flex; justify-content: space-between; background: #252525; color: var(--secondary); font-weight: bold; cursor: pointer; }
        .tono-content { display: none; padding: 12px; background: #0f0f0f; }
        .tono-group.open .tono-content { display: block; }

        .cancion-item { background: #1e1e1e; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid var(--primary); overflow: hidden; }
        .cancion-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .tabs-cancion { display: flex; background: #121212; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: var(--text-muted); cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: black; }
        
        .cancion-body { display: none; padding: 20px; white-space: pre-wrap; font-family: 'Courier New', monospace; color: #fff; background: #000; font-size: 16px; line-height: 1.5; }
        .cancion-item.open .cancion-body.visible { display: block; }

        #admin-panel { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 2px solid var(--secondary); }
    </style>
</head>
<body>

    <header>
        <div class="google-logo"><span>L</span><span>e</span><span>t</span><span>r</span><span>a</span><span>s</span></div>
        <button class="admin-trigger" onclick="loginAdmin()">🔑 ADMIN</button>
    </header>

    <div class="container">
        <div id="admin-panel">
            <input type="text" id="titulo" placeholder="Nombre de la canción..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; background:#2a2a2a; color:white; border:1px solid #444;">
            <div style="display: flex; gap: 10px;">
                <select id="ritmo" style="flex:1; padding:10px; border-radius:10px; background:#2a2a2a; color:white;"><option value="rapida">🔥 Rápida</option><option value="lenta">❄️ Lenta</option></select>
                <select id="tonalidad" style="flex:1; padding:10px; border-radius:10px; background:#2a2a2a; color:white;"><option value="C">Do (C)</option><option value="D">Re (D)</option><option value="E">Mi (E)</option><option value="F">Fa (F)</option><option value="G">Sol (G)</option><option value="A">La (A)</option><option value="B">Si (B)</option></select>
            </div>
            <textarea id="letraVoces" rows="5" placeholder="Letra Voces..." style="width:100%; margin:10px 0; border-radius:10px; padding:10px; background:#2a2a2a; color:white; border:1px solid #444;"></textarea>
            <textarea id="letraNotas" rows="5" placeholder="Letra Notas..." style="width:100%; margin:10px 0; border-radius:10px; padding:10px; background:#2a2a2a; color:white; border:1px solid #444;"></textarea>
            <button onclick="guardarLetra()" style="width:100%; padding:15px; background:var(--secondary); border:none; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">GUARDAR ☁️</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" oninput="renderizarLista()" placeholder="Busca una canción...">
        </div>

        <div class="filtros">
            <button class="filter-btn" id="btn-rapidas" onclick="cambiarRitmo('rapida', this)">🔥 Rápidas</button>
            <button class="filter-btn" id="btn-lentas" onclick="cambiarRitmo('lenta', this)">❄️ Lentas</button>
        </div>
        
        <div id="lista-tonos"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let todasLasCanciones = [];
        let ritmoActual = ''; 

        // CARGA Y ACTUALIZACIÓN AUTOMÁTICA
        function cargarCanciones() {
            database.ref('canciones').on('value', (snapshot) => {
                todasLasCanciones = [];
                snapshot.forEach(child => { 
                    const d = child.val(); 
                    d.fKey = child.key; 
                    todasLasCanciones.push(d); 
                });
                renderizarLista();
            });
        }

        function cambiarRitmo(r, btn) {
            if (ritmoActual === r) { ritmoActual = ''; btn.classList.remove('active'); }
            else { 
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); 
                btn.classList.add('active'); 
                ritmoActual = r; 
            }
            renderizarLista();
        }

        function renderizarLista() {
            const listaDiv = document.getElementById('lista-tonos');
            const buscar = document.getElementById('searchInput').value.toLowerCase().trim();
            listaDiv.innerHTML = '';

            // Lógica de filtrado mejorada
            const filtradas = todasLasCanciones.filter(c => {
                const matchNombre = c.titulo.toLowerCase().includes(buscar);
                const matchRitmo = ritmoActual === '' ? true : c.ritmo === ritmoActual;
                return matchNombre && matchRitmo;
            });

            const grupos = {};
            filtradas.forEach(c => { if(!grupos[c.tonalidad]) grupos[c.tonalidad] = []; grupos[c.tonalidad].push(c); });

            Object.keys(grupos).sort().forEach(tono => {
                const tonoDiv = document.createElement('div');
                // Si estás buscando o filtrando, se abren solas
                const isOpen = (buscar !== "" || ritmoActual !== "") ? "open" : "";
                tonoDiv.className = `tono-group ${isOpen}`;
                tonoDiv.innerHTML = `<div class="tono-header" onclick="this.parentElement.classList.toggle('open')"><span>Tono: ${tono}</span><span>${grupos[tono].length} ▾</span></div><div class="tono-content"></div>`;
                
                const content = tonoDiv.querySelector('.tono-content');
                grupos[tono].forEach(can => {
                    const canDiv = document.createElement('div');
                    canDiv.className = 'cancion-item';
                    canDiv.innerHTML = `
                        <div class="cancion-header" onclick="this.parentElement.classList.toggle('open')"><span>${can.titulo}</span></div>
                        <div class="tabs-cancion"><button id="bv-${can.id}" class="tab-btn active" onclick="tab('${can.id}','v')">Voces</button><button id="bn-${can.id}" class="tab-btn" onclick="tab('${can.id}','n')">Nota</button></div>
                        <div id="v-${can.id}" class="cancion-body visible">${can.letraVoces || ''}</div>
                        <div id="n-${can.id}" class="cancion-body">${can.letraNotas || ''}</div>`;
                    content.appendChild(canDiv);
                });
                listaDiv.appendChild(tonoDiv);
            });
        }

        function tab(id, t) {
            const v = document.getElementById('v-'+id); const n = document.getElementById('n-'+id);
            const bv = document.getElementById('bv-'+id); const bn = document.getElementById('bn-'+id);
            if(t==='v'){ v.classList.add('visible'); n.classList.remove('visible'); bv.classList.add('active'); bn.classList.remove('active'); }
            else { v.classList.remove('visible'); n.classList.add('visible'); bv.classList.remove('active'); bn.classList.add('active'); }
        }

        function guardarLetra() {
            const t = document.getElementById('titulo').value.trim();
            const r = document.getElementById('ritmo').value;
            const ton = document.getElementById('tonalidad').value;
            const v = document.getElementById('letraVoces').value;
            const n = document.getElementById('letraNotas').value;
            
            if (t) {
                database.ref('canciones').push({ 
                    id: Date.now(), 
                    titulo: t, 
                    ritmo: r, 
                    tonalidad: ton, 
                    letraVoces: v, 
                    letraNotas: n 
                }).then(() => { 
                    alert("¡Guardado con éxito!");
                    // Limpiar campos
                    document.getElementById('titulo').value = '';
                    document.getElementById('letraVoces').value = '';
                    document.getElementById('letraNotas').value = '';
                    // Mostrar todo en el inicio inmediatamente
                    ritmoActual = '';
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    renderizarLista(); 
                });
            } else {
                alert("Ponle un título a la canción");
            }
        }

        function loginAdmin() { if(prompt("Clave:") === "1234") document.getElementById('admin-panel').style.display = 'block'; }

        cargarCanciones();
    </script>
</body>
</html>
