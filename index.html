<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Letras Cloud - Jarvis Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1DB954;
            --bg: #121212;
            --card: rgba(30, 30, 30, 0.98);
            --text: #ffffff;
            --accent: #b3b3b3;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: linear-gradient(rgba(18, 18, 18, 0.9), rgba(18, 18, 18, 0.9)), 
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM1NTUiIGZpbGwtb3BhY2l0eT0iMC4yIj48cGF0aCBkPSJNMCAwaDIwdjIwaC0yMFYwem0yMCAyMGgyMHYyMGgtMjBWMjB6TTAgMjBoMjB2MjBoLTIwVjIwem0yMCAwaDIwdjIwaC0yMFYwek0wIDBoMTB2MTBIMFYwek0xMCAxMGgxMHYxMEgxMFYxMHpNMjAgMjBoMTB2MTBIMjBWMjB6TTMwIDMwaDEwdjEwSDMwVjMwek0wIDIwaDEwdjEwSDBWMjB6TTEwIDMwaDEwdjEwSDEwVjMwek0yMCAwIGgxMHYxMEgyMFYwek0zMCAxMGgxMHYxMEgzMFYxMHpNMzAgMjB2NWg1VjIwSDMwRHpNMzAgMzBoNXY1SDMwVjMwek0zNSAyNWg1djVISDM1VjI1eiIvPjwvZz48L2c+PC9zdmc+');
            color: var(--text);
            margin: 0; padding: 0;
        }
        
        /* Navegación */
        .tabs {
            display: flex;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            justify-content: center;
            border-bottom: 2px solid var(--primary);
        }
        .tab-btn {
            padding: 15px 20px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Formulario */
        .input-group {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            max-width: 900px;
            margin: 0 auto 30px auto;
            border: 1px solid #333;
        }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select, input, textarea {
            background: #282828; color: white; border: 1px solid #444;
            padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box;
        }
        .btn-save {
            background: var(--primary); color: black; font-weight: bold;
            padding: 18px; border: none; border-radius: 8px; width: 100%;
            cursor: pointer; font-size: 16px; margin-top: 10px;
        }

        /* Estructura de Visualización Doble Columna */
        .view-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .view-column {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            min-height: 80vh;
        }
        .column-header {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid var(--primary);
        }

        /* Tarjetas pequeñas para las columnas */
        .mini-card {
            background: var(--card);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-top: 3px solid var(--primary);
        }
        .mini-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .mini-card-title { color: var(--primary); margin: 0; font-size: 1.1em; }
        .badge { background: #444; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .letra-content {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }

        @media (max-width: 1000px) {
            .view-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'nuevo')">➕ GUARDAR</button>
        <button class="tab-btn" onclick="openTab(event, 'lentas')">🐢 LENTAS</button>
        <button class="tab-btn" onclick="openTab(event, 'rapidas')">⚡ RÁPIDAS</button>
    </nav>

    <div class="container">
        
        <section id="nuevo" class="content-section active">
            <div class="input-group">
                <h2 style="color:var(--primary); margin:0 0 20px 0; text-align:center;">Registrar Canción</h2>
                <div class="form-grid">
                    <input type="text" id="titulo" placeholder="Título...">
                    <select id="velocidad">
                        <option value="lenta">Ritmo: Lenta</option>
                        <option value="rapida">Ritmo: Rápida</option>
                    </select>
                    <select id="nota">
                        <option value="C">Nota: C</option><option value="D">Nota: D</option>
                        <option value="E">Nota: E</option><option value="F">Nota: F</option>
                        <option value="G">Nota: G</option><option value="A">Nota: A</option>
                        <option value="B">Nota: B</option>
                    </select>
                    <select id="tipoTono">
                        <option value="Mayor">Mayor</option>
                        <option value="Menor">Menor</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <textarea id="letraVoces" rows="12" placeholder="Escribe la letra para voces..."></textarea>
                    <textarea id="letraNota" rows="12" placeholder="Letra con notas musicales..."></textarea>
                </div>
                <button class="btn-save" onclick="guardarLetra()">GUARDAR EN LA NUBE</button>
            </div>
        </section>

        <section id="lentas" class="content-section">
            <div class="view-grid">
                <div class="view-column">
                    <div class="column-header">🎙️ Letra Voces</div>
                    <div id="voces-lentas"></div>
                </div>
                <div class="view-column">
                    <div class="column-header">🎸 Letra con Notas</div>
                    <div id="notas-lentas"></div>
                </div>
            </div>
        </section>

        <section id="rapidas" class="content-section">
            <div class="view-grid">
                <div class="view-column">
                    <div class="column-header">🎙️ Letra Voces</div>
                    <div id="voces-rapidas"></div>
                </div>
                <div class="view-column">
                    <div class="column-header">🎸 Letra con Notas</div>
                    <div id="notas-rapidas"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // Configuración de tu base de datos
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openTab(evt, sectionName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("content-section");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].className = tabcontent[i].className.replace(" active", ""); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
            document.getElementById(sectionName).className += " active";
            evt.currentTarget.className += " active";
        }

        function guardarLetra() {
            const t = document.getElementById('titulo').value;
            const lv = document.getElementById('letraVoces').value;
            const ln = document.getElementById('letraNota').value;
            const v = document.getElementById('velocidad').value;
            const nota = document.getElementById('nota').value;
            const tipo = document.getElementById('tipoTono').value;

            if (t) {
                database.ref('canciones').push().set({
                    nombre: t,
                    letraVoces: lv,
                    letraNota: ln,
                    velocidad: v,
                    tono: `${nota} ${tipo}`,
                    timestamp: Date.now()
                }).then(() => {
                    alert("¡Guardada!");
                    document.getElementById('titulo').value = '';
                    document.getElementById('letraVoces').value = '';
                    document.getElementById('letraNota').value = '';
                });
            } else { alert("Falta el título"); }
        }

        database.ref('canciones').on('value', (snapshot) => {
            const vLentas = document.getElementById('voces-lentas');
            const nLentas = document.getElementById('notas-lentas');
            const vRapidas = document.getElementById('voces-rapidas');
            const nRapidas = document.getElementById('notas-rapidas');

            // Limpiar todo
            [vLentas, nLentas, vRapidas, nRapidas].forEach(el => el.innerHTML = '');
            
            let canciones = [];
            snapshot.forEach(child => { canciones.push(child.val()); });
            canciones.reverse();

            canciones.forEach(item => {
                // Función para crear el HTML de la mini tarjeta
                const crearCard = (letra) => `
                    <div class="mini-card">
                        <div class="mini-card-header">
                            <h4 class="mini-card-title">${item.nombre}</h4>
                            <span class="badge">${item.tono}</span>
                        </div>
                        <div class="letra-content">${letra}</div>
                    </div>
                `;

                if (item.velocidad === 'lenta') {
                    if (item.letraVoces) vLentas.insertAdjacentHTML('beforeend', crearCard(item.letraVoces));
                    if (item.letraNota) nLentas.insertAdjacentHTML('beforeend', crearCard(item.letraNota));
                } else {
                    if (item.letraVoces) vRapidas.insertAdjacentHTML('beforeend', crearCard(item.letraVoces));
                    if (item.letraNota) nRapidas.insertAdjacentHTML('beforeend', crearCard(item.letraNota));
                }
            });
        });
    </script>
</body>
</html>
