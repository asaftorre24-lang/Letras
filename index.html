<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Letras Pro έαΒΎ╕Π</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #1DB954; 
            --bg-base: #121212;
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border: #333333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- FONDO CON NOTAS MUSICALES --- */
        .music-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e1e30, #121212);
        }

        .music-note {
            position: absolute;
            color: rgba(255, 255, 255, 0.04); /* S├║per sutil para no cansar la vista */
            font-family: serif;
            user-select: none;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }

        header { width: 100%; text-align: center; padding: 25px 0; border-bottom: 1px solid var(--border); background: rgba(18, 18, 18, 0.8); }
        header h1 { font-size: 24px; color: var(--primary); margin: 0; }

        .input-group {
            background: var(--card-bg);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }

        input, textarea, select {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border-radius: 10px; border: 1px solid var(--border);
            background: #2a2a2a; color: white; font-size: 16px;
        }

        button.btn-save {
            width: 100%; padding: 16px; background: var(--primary);
            border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; color: black; font-size: 16px;
        }

        .filtros { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .filter-btn {
            padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card-bg); color: white; cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: black; border-color: var(--primary); }

        .tono-group { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: rgba(24, 24, 24, 0.8); }
        .tono-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; background: #252525; color: var(--primary); font-weight: bold; }
        .tono-content { display: none; padding: 10px; }
        .tono-group.open .tono-content { display: block; }

        .cancion-item { background: #1e1e1e; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid var(--primary); position: relative; }
        .cancion-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .cancion-body { display: none; padding: 15px; border-top: 1px solid var(--border); white-space: pre-wrap; font-family: 'Courier New', monospace; color: var(--text-muted); font-size: 15px; }
        .cancion-item.open .cancion-body { display: block; }

        .btn-del { color: #ff4d4d; background: none; border: none; font-weight: bold; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="music-bg" id="bg-music"></div>

    <header><h1>ΏθΟ╡ Mi Repertorio Pro</h1></header>

    <div class="container">
        <div class="input-group">
            <input type="text" id="titulo" placeholder="T├φtulo de la canci├│n..." autocomplete="off">
            <div style="display:flex; gap:10px;">
                <select id="ritmo">
                    <option value="rapida">ΏθΦξ R├κpida</option>
                    <option value="lenta">έζΕΎ╕Π Lenta</option>
                </select>
                <select id="tonalidad">
                    <option value="C">Do (C)</option><option value="Cm">Do m (Cm)</option>
                    <option value="D">Re (D)</option><option value="Dm">Re m (Dm)</option>
                    <option value="E">Mi (E)</option><option value="Em">Mi m (Em)</option>
                    <option value="F">Fa (F)</option><option value="Fm">Fa m (Fm)</option>
                    <option value="G">Sol (G)</option><option value="Gm">Sol m (Gm)</option>
                    <option value="A">La (A)</option><option value="Am">La m (Am)</option>
                    <option value="B">Si (B)</option><option value="Bm">Si m (Bm)</option>
                </select>
            </div>
            <textarea id="letra" rows="6" placeholder="Letra y acordes..."></textarea>
            <button class="btn-save" onclick="guardarLetra()">GUARDAR CANCI├ΥN</button>
        </div>

        <div class="filtros">
            <button class="filter-btn active" onclick="cambiarRitmo('rapida', this)">ΏθΦξ R├κpidas</button>
            <button class="filter-btn" onclick="cambiarRitmo('lenta', this)">έζΕΎ╕Π Lentas</button>
        </div>

        <div id="lista-tonos"></div>
    </div>

    <script>
        // --- GENERADOR DE NOTAS DE FONDO ---
        function crearNotasFondo() {
            const bg = document.getElementById('bg-music');
            const notas = ['έβσ', 'έβς', 'έβτ', 'έβυ', 'έβφ', 'έβχ', 'έβψ', 'έΙχ', 'ΏζΕΑ', 'ΏζΕΒ', 'ΏζΕΓ', 'ΏζΕΔ', 'ΏζΕΕ', 'ΏζΕΖ', 'ΏζΕΗ', 'ΏζΕΘ', 'ΏζΕΙ', 'ΏζΕΚ', 'ΏζΕΛ', 'ΏζΕΜ', 'ΏζΕΝ', 'ΏζΕΞ', 'ΏζΕΟ', 'ΏζΕΠ', 'ΏζΕΡ', 'ΏζΕΣ', 'ΏζΕΤ', 'ΏζΕΥ', 'ΏζΕΦ', 'ΏζΕΧ', 'ΏζΕΨ', 'ΏζΕΩ', 'ΏζΕα', 'ΏζΕβ', 'ΏζΕγ', 'ΏζΕδ', 'ΏζΕε', 'ΏζΕζ', 'ΏζΕη', 'ΏζΕθ', 'ΏζΕι', 'ΏζΕκ', 'ΏζΕλ', 'ΏζΕμ', 'ΏζΕν', 'ΏζΕξ', 'ΏζΕο', 'ΏζΕπ', 'ΏζΕρ', 'ΏζΕσ', 'ΏζΕς', 'ΏζΕτ', 'ΏζΕυ', 'ΏζΕφ', 'ΏζΕχ', 'ΏζΕψ', 'ΏζΕ░', 'ΏζΕ▒', 'ΏζΕ▓', 'ΏζΕ│'];
            
            for (let i = 0; i < 40; i++) {
                const span = document.createElement('span');
                span.className = 'music-note';
                span.innerText = notas[Math.floor(Math.random() * notas.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.fontSize = Math.random() * (60 - 20) + 20 + 'px';
                span.style.transform = `rotate(${Math.random() * 45}deg)`;
                bg.appendChild(span);
            }
        }
        crearNotasFondo();

        // --- L├ΥGICA DE FIREBASE ---
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let ritmoActual = 'rapida';

        function guardarLetra() {
            const titulo = document.getElementById('titulo').value.trim();
            const ritmo = document.getElementById('ritmo').value;
            const tonalidad = document.getElementById('tonalidad').value;
            const letra = document.getElementById('letra').value.trim();

            if (titulo && letra) {
                const nuevaRef = database.ref('canciones').push();
                nuevaRef.set({ id: nuevaRef.key, titulo, ritmo, tonalidad, letra, fecha: Date.now() })
                .then(() => {
                    document.getElementById('titulo').value = '';
                    document.getElementById('letra').value = '';
                    alert("┬κGuardada! έερ");
                });
            }
        }

        function eliminarCancion(id) {
            if (confirm("┬┐Eliminar canci├│n?")) {
                database.ref('canciones/' + id).remove();
            }
        }

        function cambiarRitmo(ritmo, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ritmoActual = ritmo;
            cargarCanciones();
        }

        function cargarCanciones() {
            database.ref('canciones').on('value', (snapshot) => {
                const listaDiv = document.getElementById('lista-tonos');
                listaDiv.innerHTML = '';
                const datos = [];
                snapshot.forEach(child => { datos.push(child.val()); });

                const grupos = {};
                datos.filter(d => d.ritmo === ritmoActual).forEach(c => {
                    if (!grupos[c.tonalidad]) grupos[c.tonalidad] = [];
                    grupos[c.tonalidad].push(c);
                });

                Object.keys(grupos).sort().forEach(tono => {
                    const tonoDiv = document.createElement('div');
                    tonoDiv.className = 'tono-group';
                    tonoDiv.innerHTML = `
                        <div class="tono-header" onclick="this.parentElement.classList.toggle('open')">
                            <span>Tono: ${tono}</span>
                            <span>${grupos[tono].length}</span>
                        </div>
                        <div class="tono-content">
                            ${grupos[tono].map(can => `
                                <div class="cancion-item">
                                    <div class="cancion-header" onclick="this.parentElement.classList.toggle('open')">
                                        <span>${can.titulo}</span>
                                        <button class="btn-del" onclick="event.stopPropagation(); eliminarCancion('${can.id}')">έεΧ</button>
                                    </div>
                                    <div class="cancion-body">${can.letra}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    listaDiv.appendChild(tonoDiv);
                });
            });
        }
        cargarCanciones();
    </script>
</body>
</html>
