<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Letras Cloud - Pantalla Dividida</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1DB954;
            --bg: #121212;
            --card: rgba(30, 30, 30, 0.98);
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }
        
        .tabs {
            display: flex;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            justify-content: center;
            border-bottom: 2px solid var(--primary);
        }
        .tab-btn {
            padding: 15px 20px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { max-width: 100%; margin: 10px auto; padding: 0 10px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Formulario de Registro */
        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            max-width: 900px;
            margin: 0 auto 30px auto;
            border: 1px solid #333;
        }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select, input, textarea {
            background: #282828; color: white; border: 1px solid #444;
            padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box;
        }
        .btn-save {
            background: var(--primary); color: black; font-weight: bold;
            padding: 15px; border: none; border-radius: 8px; width: 100%;
            cursor: pointer; font-size: 16px;
        }

        /* ACORDEÓN ESTRUCTURA LADO A LADO */
        .acordeon-item {
            background: var(--card);
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            border-left: 5px solid var(--primary);
        }
        .acordeon-header {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .acordeon-titulo { margin: 0; font-size: 1.2em; color: var(--primary); }
        .badge { background: #444; color: var(--primary); padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        .acordeon-contenido {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .acordeon-item.open .acordeon-contenido {
            max-height: 5000px;
        }

        /* ESTA ES LA PARTE CLAVE: EL GRID DE DOS COLUMNAS */
        .view-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Mitad y mitad */
            gap: 10px;
            padding: 10px;
            border-top: 1px solid #333;
        }
        
        .column-section {
            display: flex;
            flex-direction: column;
        }

        .column-header-info {
            background: rgba(29, 185, 84, 0.15);
            color: var(--primary);
            padding: 6px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px 4px 0 0;
            border: 1px solid rgba(29, 185, 84, 0.3);
            border-bottom: none;
        }

        .letra-box {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #eee;
            line-height: 1.4;
            background: #000;
            padding: 12px;
            border-radius: 0 0 4px 4px;
            border: 1px solid #333;
            min-height: 200px;
        }

        /* Responsive: Si el celular es muy angosto, se ponen uno abajo de otro */
        @media (max-width: 600px) {
            .view-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'nuevo')">➕ GUARDAR</button>
        <button class="tab-btn" onclick="openTab(event, 'lentas')">🐢 LENTAS</button>
        <button class="tab-btn" onclick="openTab(event, 'rapidas')">⚡ RÁPIDAS</button>
    </nav>

    <div class="container">
        
        <section id="nuevo" class="content-section active">
            <div class="input-group">
                <h2 style="color:var(--primary); text-align:center; margin:0 0 15px 0;">Nueva Canción</h2>
                <div class="form-grid">
                    <input type="text" id="titulo" placeholder="Título...">
                    <select id="velocidad">
                        <option value="lenta">Ritmo: Lenta</option>
                        <option value="rapida">Ritmo: Rápida</option>
                    </select>
                    <select id="nota">
                        <option value="C">Nota: C</option><option value="D">Nota: D</option>
                        <option value="E">Nota: E</option><option value="F">Nota: F</option>
                        <option value="G">Nota: G</option><option value="A">Nota: A</option>
                        <option value="B">Nota: B</option>
                    </select>
                    <select id="tipoTono">
                        <option value="Mayor">Mayor</option>
                        <option value="Menor">Menor</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <textarea id="letraVoces" rows="10" placeholder="LADO IZQUIERDO: Letra Voces..."></textarea>
                    <textarea id="letraNota" rows="10" placeholder="LADO DERECHO: Letra con Acordes..."></textarea>
                </div>
                <button class="btn-save" style="margin-top:15px;" onclick="guardarLetra()">GUARDAR REPERTORIO</button>
            </div>
        </section>

        <section id="lentas" class="content-section">
            <div id="lista-lentas"></div>
        </section>

        <section id="rapidas" class="content-section">
            <div id="lista-rapidas"></div>
        </section>

    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openTab(evt, sectionName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("content-section");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].className = tabcontent[i].className.replace(" active", ""); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
            document.getElementById(sectionName).className += " active";
            evt.currentTarget.className += " active";
        }

        function toggleAcordeon(elemento) {
            const items = document.getElementsByClassName("acordeon-item");
            for(let item of items) {
                if(item !== elemento.parentElement) item.classList.remove('open');
            }
            elemento.parentElement.classList.toggle('open');
        }

            const nota = document.getElementById('nota').value;
            const tipo = document.getElementById('tipoTono').value;

            if (t) {
                database.ref('canciones').push().set({
