<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras Repertorio 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4285F4; 
            --bg-base: #1e1e1e; 
            --card-bg: rgba(30, 30, 30, 0.95);
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border: #333333;
            --secondary: #34A853; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .music-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; background: linear-gradient(to bottom, #121212, #000000); }
        .music-note { position: absolute; color: rgba(255, 255, 255, 0.05); font-family: serif; user-select: none; }
        
        .container { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }

        header { width: 100%; text-align: center; padding: 20px 0; background: #000; position: relative; }
        .google-logo { font-size: 40px; font-weight: bold; }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #DB4437; }
        .google-logo span:nth-child(3) { color: #F4B400; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #DB4437; }

        /* Botón Admin Discreto */
        .admin-trigger { position: absolute; right: 15px; top: 25px; background: none; border: 1px solid #333; color: #555; border-radius: 5px; padding: 5px; font-size: 10px; cursor: pointer; }

        /* --- PANEL DE EDICIÓN (Oculto por defecto) --- */
        #admin-panel { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 2px solid var(--secondary); }
        
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #2a2a2a; color: white; font-size: 16px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-row select { flex: 1; }
        
        button.btn-save { width: 100%; padding: 16px; background-color: var(--secondary); border: none; border-radius: 12px; color: black; text-transform: uppercase; font-weight: bold; }
        
        .filtros { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .filter-btn { padding: 10px 25px; border-radius: 25px; border: 1px solid var(--border); background: var(--card-bg); color: white; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        .tono-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; background: rgba(24, 24, 24, 0.8); }
        .tono-header { padding: 18px; display: flex; justify-content: space-between; background: #252525; color: var(--secondary); font-weight: bold; cursor: pointer; }
        .tono-content { display: none; padding: 12px; background: #0f0f0f; }
        .tono-group.open .tono-content { display: block; }

        .cancion-item { background: #1e1e1e; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid var(--primary); overflow: hidden; }
        .cancion-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tabs-cancion { display: flex; background: #121212; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: var(--text-muted); cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: black; }
        
        .cancion-body { display: none; padding: 20px; white-space: pre-wrap; font-family: 'Courier New', monospace; color: #fff; background: #000; font-size: 16px; }
        .cancion-item.open .cancion-body.visible { display: block; }

        /* Botón de borrar (Solo se verá en modo Admin) */
        .btn-del { display: none; color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="music-bg" id="bg-music"></div>

    <header>
        <div class="google-logo"><span>L</span><span>e</span><span>t</span><span>r</span><span>a</span><span>s</span></div>
        <button class="admin-trigger" onclick="loginAdmin()">🔑 ADMIN</button>
    </header>

    <div class="container">
        
        <div id="admin-panel">
            <h3 style="color: var(--secondary); margin-top: 0; text-align: center;">MODO EDITOR ACTIVO ✨</h3>
            <input type="text" id="titulo" placeholder="🔍 Nombre de la canción...">
            <div class="form-row">
                <select id="ritmo">
                    <option value="rapida">🔥 Rápida</option>
                    <option value="lenta">❄️ Lenta</option>
                </select>
                <select id="tonalidad">
                    <option value="C">Do (C)</option><option value="D">Re (D)</option>
                    <option value="E">Mi (E)</option><option value="F">Fa (F)</option>
                    <option value="G">Sol (G)</option><option value="A">La (A)</option>
                    <option value="B">Si (B)</option>
                </select>
            </div>
            <p style="margin: 0 0 5px 0; font-size: 13px; color: var(--secondary); font-weight: bold;">VOCES (SOLO LETRA)</p>
            <textarea id="letraVoces" rows="5"></textarea>
            <p style="margin: 0 0 5px 0; font-size: 13px; color: var(--secondary); font-weight: bold;">NOTA ORIGINAL</p>
            <textarea id="letraNotas" rows="5"></textarea>
            <button class="btn-save" onclick="guardarLetra()">GUARDAR EN LA NUBE ☁️</button>
            <button style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;" onclick="location.reload()">Cerrar Sesión</button>
        </div>

        <div class="filtros">
            <button class="filter-btn active" onclick="cambiarRitmo('rapida', this)">🔥 Rápidas</button>
            <button class="filter-btn" onclick="cambiarRitmo('lenta', this)">❄️ Lentas</button>
        </div>
        
        <div id="lista-tonos"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE ACCESO ---
        const CLAVE_MAESTRA = "1234"; // Cambia esta clave si quieres
        let modoAdmin = false;

        function loginAdmin() {
            const pass = prompt("Introduce la clave para editar:");
            if(pass === CLAVE_MAESTRA) {
                modoAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                // Mostrar botones de borrar
                document.querySelectorAll('.btn-del').forEach(b => b.style.display = 'block');
                alert("Modo editor activado, Eddy Efraín.");
            } else {
                alert("Clave incorrecta.");
            }
        }

        // --- GENERADOR DE NOTAS DE FONDO ---
        function crearNotasFondo() {
            const bg = document.getElementById('bg-music');
            const figuras = ['♩', '♪', '♫', '♬', '♭', '♯', '𝄞', '𝄢', '𝄥'];
            for (let i = 0; i < 40; i++) {
                const span = document.createElement('span');
                span.className = 'music-note';
                span.innerText = figuras[Math.floor(Math.random() * figuras.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.fontSize = Math.random() * 20 + 20 + 'px';
                span.style.opacity = Math.random() * 0.1 + 0.05;
                bg.appendChild(span);
            }
        }
        crearNotasFondo();

        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let ritmoActual = 'rapida';

        function guardarLetra() {
            const titulo = document.getElementById('titulo').value.trim();
            const ritmo = document.getElementById('ritmo').value;
            const tonalidad = document.getElementById('tonalidad').value;
            const letraVoces = document.getElementById('letraVoces').value.trim();
            const letraNotas = document.getElementById('letraNotas').value.trim();

            if (titulo && (letraVoces || letraNotas)) {
                const nuevaRef = database.ref('canciones').push();
                nuevaRef.set({ id: nuevaRef.key, titulo, ritmo, tonalidad, letraVoces, letraNotas, fecha: Date.now() })
                .then(() => {
                    document.getElementById('titulo').value = '';
                    document.getElementById('letraVoces').value = '';
                    document.getElementById('letraNotas').value = '';
                    alert("¡Guardada!");
                });
            }
        }

        function switchTab(id, tab) {
            const v = document.getElementById('voces-'+id); const n = document.getElementById('notas-'+id);
            const bv = document.getElementById('btn-voces-'+id); const bn = document.getElementById('btn-notas-'+id);
            if(tab==='voces'){ v.classList.add('visible'); n.classList.remove('visible'); bv.classList.add('active'); bn.classList.remove('active'); }
            else { v.classList.remove('visible'); n.classList.add('visible'); bv.classList.remove('active'); bn.classList.add('active'); }
        }

        function eliminarCancion(id) { if(confirm("¿Borrar?")) database.ref('canciones/'+id).remove(); }
        
        function cambiarRitmo(ritmo, btn) { 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); ritmoActual = ritmo; cargarCanciones(); 
        }

        function cargarCanciones() {
            database.ref('canciones').on('value', (snapshot) => {
                const listaDiv = document.getElementById('lista-tonos');
                listaDiv.innerHTML = '';
                if(!snapshot.exists()) return;
                const datos = []; snapshot.forEach(c => datos.push(c.val()));
                const grupos = {};
                datos.filter(d => d.ritmo === ritmoActual).forEach(c => {
                    if(!grupos[c.tonalidad]) grupos[c.tonalidad] = [];
                    grupos[c.tonalidad].push(c);
                });
                Object.keys(grupos).sort().forEach(tono => {
                    const tonoDiv = document.createElement('div');
                    tonoDiv.className = 'tono-group';
                    tonoDiv.innerHTML = `<div class="tono-header" onclick="this.parentElement.classList.toggle('open')"><span>Tono: ${tono}</span><span>${grupos[tono].length} ▾</span></div><div class="tono-content"></div>`;
                    const content = tonoDiv.querySelector('.tono-content');
                    grupos[tono].sort((a,b)=>a.titulo.localeCompare(b.titulo)).forEach(can => {
                        const canDiv = document.createElement('div');
                        canDiv.className = 'cancion-item';
                        // El botón de borrar se renderiza pero se oculta con CSS a menos que sea modoAdmin
                        const displayDel = modoAdmin ? 'block' : 'none';
                        canDiv.innerHTML = `
                            <div class="cancion-header" onclick="this.parentElement.classList.toggle('open')">
                                <span>${can.titulo}</span>
                                <button class="btn-del" style="display:${displayDel}" onclick="event.stopPropagation(); eliminarCancion('${can.id}')">✕</button>
                            </div>
                            <div class="tabs-cancion"><button id="btn-voces-${can.id}" class="tab-btn active" onclick="switchTab('${can.id}','voces')">Voces</button><button id="btn-notas-${can.id}" class="tab-btn" onclick="switchTab('${can.id}','notas')">Nota</button></div>
                            <div id="voces-${can.id}" class="cancion-body visible">${can.letraVoces || ''}</div>
                            <div id="notas-${can.id}" class="cancion-body">${can.letraNotas || ''}</div>`;
                        content.appendChild(canDiv);
                    });
                    listaDiv.appendChild(tonoDiv);
                });
            });
        }
        cargarCanciones();
    </script>
</body>
</html>
