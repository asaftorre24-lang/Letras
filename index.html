<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras PRO 🎵</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #4285F4; --green: #34A853; --red: #ea4335; --bg: #000000; --text: #eee; }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { width: 100%; text-align: center; padding: 25px 0; background: rgba(0,0,0,0.85); position: relative; border-bottom: 1px solid #222; }
        .logo { font-family: 'Major Mono Display', monospace; font-size: 38px; font-weight: bold; background: linear-gradient(to right, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-btn { position: absolute; right: 15px; top: 25px; background: rgba(255,255,255,0.05); color: #666; border: 1px solid #333; padding: 7px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        
        .container { width: 92%; max-width: 500px; padding: 20px 0; }
        
        /* BUSCADOR */
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #main-search { width: 100%; padding: 15px; text-align: center; border-radius: 25px; border: 1px solid #333; background: #151515; color: white; font-size: 16px; outline: none; box-sizing: border-box; }

        #admin-panel { display: none; border: 2px solid var(--green); border-radius: 20px; padding: 20px; margin-bottom: 25px; background: #0a0a0a; }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* BOTONES DE GUARDADO (Según captura) */
        .save-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-voces { background: #3b6fc3; }
        .btn-notas { background: #2b2605; border: 1px solid #917c0e; color: #917c0e; }
        .btn-all { background: #34a853; }

        .filter-group { display: flex; gap: 15px; margin-bottom: 35px; }
        .f-btn { flex: 1; padding: 18px; border-radius: 22px; border: 1px solid #333; background: #282828; color: white; cursor: pointer; font-weight: bold; }
        .f-btn.active { background: var(--blue); }

        .div-title { margin: 30px 0 10px; color: var(--blue); font-weight: bold; text-align: center; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
        .tono-box { background: #1e1e1e; border-radius: 15px; margin-bottom: 10px; }
        .tono-title { padding: 18px; color: var(--green); font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .cancion-list { display: none; padding: 10px; }
        .tono-box.open .cancion-list { display: block; }

        .item { background: #2d2d2d; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid var(--blue); position: relative; }
        .item-head { padding: 15px; cursor: pointer; }
        .item-content { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .item.open .item-content { display: block; }

        .del-total { display: none; position: absolute; right: 10px; top: 12px; background: none; border: none; font-size: 18px; cursor: pointer; }
        body.admin-mode .del-total { display: block; }

        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .t-btn { flex: 1; padding: 10px; border: none; background: #222; color: #777; border-radius: 5px; cursor: pointer; }
        .t-btn.active { background: var(--green); color: black; }
        
        .text-area { white-space: pre-wrap; font-size: 18px; display: none; padding: 10px; }
        .text-area.active { display: block; }

        .clean-section { display: none; background: var(--red); color: white; border: none; padding: 5px; border-radius: 5px; font-size: 10px; margin-top: 5px; cursor: pointer; }
        body.admin-mode .clean-section { display: inline-block; }
    </style>
</head>
<body id="body-app">

<header>
    <div class="logo" id="main-logo">LETRAS</div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="main-search" placeholder="🔍 Buscar canción..." oninput="draw()">
    </div>

    <div id="admin-panel">
        <input type="text" id="t" placeholder="🎵 Título de la canción...">
        <div style="display:flex; gap:10px;">
            <select id="r">
                <option value="rapida">🏍️ Rápida</option>
                <option value="lenta">🐢 Lenta</option>
            </select>
            <select id="ton">
                <option value="C Mayor">Do (C)</option>
                <option value="Dm Menor">Re m (Dm)</option>
            </select>
        </div>
        <textarea id="lv" rows="3" placeholder="🎤 Letra Voces..."></textarea>
        <textarea id="ln" rows="3" placeholder="🎹 Notas / Acordes..."></textarea>
        
        <button class="save-btn btn-voces" onclick="save('v')">🎤 Guardar SÓLO Letra (Voces)</button>
        <button class="save-btn btn-notas" onclick="save('n')">🎹 Guardar SÓLO Notas / Acordes</button>
        <button class="save-btn btn-all" onclick="save('all')">💾 GUARDAR TODO JUNTO</button>
    </div>

    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🏍️ Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">🐢 Lentas</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    const app = firebase.initializeApp({ databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    let data = [];
    let filterR = '';

    function load() {
        db.ref('canciones').on('value', s => {
            data = [];
            s.forEach(c => { data.push({ ...c.val(), key: c.key }); });
            draw();
        });
    }

    function setR(r) { filterR = (filterR === r) ? '' : r; draw(); }

    function draw() {
        const list = document.getElementById('main-list');
        const query = document.getElementById('main-search').value.toLowerCase();
        list.innerHTML = '';
        
        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        if (!filterR && !query) return;

        let filtered = data.filter(c => (!filterR || c.ritmo === filterR) && (!query || c.titulo.toLowerCase().includes(query)));

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C Mayor";
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        Object.keys(groups).sort().forEach(t => {
            const esMenor = t.toLowerCase().includes('menor');
            let displayTon = t.match(/\(([^)]+)\)/)?.[1] || t;
            if(esMenor && !displayTon.endsWith('m')) displayTon += 'm';

            const div = document.createElement('div');
            // Abre el grupo de tono si hay búsqueda, pero no la canción
            div.className = 'tono-box' + (query ? ' open' : '');
            div.innerHTML = `<div class="tono-title" onclick="this.parentElement.classList.toggle('open')"><span>🎶 ${displayTon}</span> <span>${groups[t].length} ▾</span></div><div class="cancion-list"></div>`;
            const cList = div.querySelector('.cancion-list');
            
            groups[t].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item'; // SIEMPRE CERRADA AL INICIO
                item.innerHTML = `
                    <button class="del-total" onclick="remove('${c.key}')">🗑️</button>
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')"><span>🎵 ${c.titulo}</span></div>
                    <div class="item-content">
                        <div class="tabs">
                            <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                            <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || '...'}</div>
                        <div class="text-area n">${c.letraNotas || '...'}</div>
                        <button class="clean-section" onclick="clearSec('${c.key}', 'letraVoces')">🧹 Limpiar Voces</button>
                        <button class="clean-section" onclick="clearSec('${c.key}', 'letraNotas')">🧹 Limpiar Notas</button>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function checkAdmin() { if(prompt("Clave:") === "ipuc") document.body.classList.add('admin-mode'), document.getElementById('admin-panel').style.display = 'block'; }
    
    function clearSec(key, field) { if(confirm("¿Limpiar esta sección?")) { let u = {}; u[field] = "..."; db.ref('canciones/'+key).update(u); }}
    function remove(key) { if(confirm("¿Borrar todo?")) db.ref('canciones/'+key).remove(); }

    function save(type) {
        let payload = {
            titulo: document.getElementById('t').value, ritmo: document.getElementById('r').value,
            tonalidad: document.getElementById('ton').value,
            letraVoces: (type === 'n') ? '...' : document.getElementById('lv').value,
            letraNotas: (type === 'v') ? '...' : document.getElementById('ln').value
        };
        db.ref('canciones').push(payload).then(() => { alert("Guardado"); location.reload(); });
    }

    load();
</script>
</body>
</html>
