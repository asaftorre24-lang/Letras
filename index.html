<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras PRO 🎵</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Letras IPUC">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png?v=final">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png?v=final">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #4285F4; --green: #34A853; --red: #ea4335; --bg: #0b0b0b; --text: #eee; }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            background-image: linear-gradient(rgba(11, 11, 11, 0.95), rgba(11, 11, 11, 0.95)), url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            background-attachment: fixed; color: var(--text); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { width: 100%; text-align: center; padding: 25px 0; background: rgba(0,0,0,0.8); position: relative; border-bottom: 1px solid #222; backdrop-filter: blur(10px); z-index: 10; }
        .logo { font-family: 'Major Mono Display', monospace; font-size: 38px; font-weight: bold; letter-spacing: 3px; background: linear-gradient(to right, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-btn { position: absolute; right: 15px; top: 25px; background: rgba(255,255,255,0.05); color: #666; border: 1px solid #333; padding: 7px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .container { width: 92%; max-width: 500px; padding: 20px 0; z-index: 5; }
        
        /* BARRA DE BÚSQUEDA */
        .search-container { width: 100%; margin-bottom: 20px; }
        #main-search { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid #333; background: #151515; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        #main-search:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(66, 133, 244, 0.2); }

        #admin-panel { display: none; border: 2px solid var(--green); border-radius: 20px; padding: 20px; margin-bottom: 25px; background: rgba(10,10,10,0.95); }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; box-sizing: border-box; }
        
        #suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .sug-item { background: #333; font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid #444; }
        .sug-item:hover { background: var(--blue); }

        .filter-group { display: flex; gap: 15px; margin-bottom: 35px; justify-content: center; }
        .f-btn { flex: 1; padding: 18px; border-radius: 22px; border: 1px solid #333; background: rgba(40,40,40,0.6); color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 20px rgba(66, 133, 244, 0.3); }
        
        .tono-box { background: rgba(30,30,30,0.7); border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        .tono-title { padding: 20px; color: var(--green); font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .cancion-list { display: none; padding: 12px; }
        .tono-box.open .cancion-list { display: block; }
        
        .item { background: rgba(45,45,45,0.9); margin-bottom: 12px; border-radius: 12px; border-left: 5px solid var(--blue); }
        .item-head { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { display: none; background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .admin-mode .del-btn { display: inline-block; }
        
        .item-content { display: none; padding: 15px; background: #000; border-top: 1px solid #333; border-radius: 0 0 12px 12px; }
        .item.open .item-content { display: block; }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: #222; }
        .t-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #777; cursor: pointer; font-weight: bold; }
        .t-btn.active { background: var(--green); color: black; }
        
        /* VISOR MEJORADO: Letra más grande y clara */
        .text-area { white-space: pre-wrap; font-family: 'Segoe UI', sans-serif; font-size: 24px; font-weight: 500; line-height: 1.6; display: none; padding: 15px; color: #fff; text-shadow: 1px 1px 2px black; }
        .text-area.active { display: block; }
        .text-area.n { color: #FFD700; font-family: monospace; } /* Notas en color oro */
        
        .btn-save { width: 100%; padding: 18px; background: var(--green); border: none; color: white; font-weight: bold; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body id="body-app">

<header>
    <div class="logo" id="main-logo">LETRAS</div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="main-search" placeholder="🔍 Buscar canción por nombre..." oninput="draw()">
    </div>

    <div id="admin-panel">
        <input type="text" id="t" placeholder="🎵 Título de la canción..." oninput="updateSug()">
        <div id="suggestions"></div>
        <div style="display:flex; gap:10px;">
            <select id="r">
                <option value="rapida">🏍️ Rápida</option>
                <option value="lenta">🐢 Lenta</option>
            </select>
            <select id="ton">
                <option value="C Mayor">Do (C)</option><option value="D Mayor">Re (D)</option>
                <option value="E Mayor">Mi (E)</option><option value="F Mayor">Fa (F)</option>
                <option value="G Mayor">Sol (G)</option><option value="A Mayor">La (A)</option>
                <option value="B Mayor">Si (B)</option>
            </select>
        </div>
        <textarea id="lv" rows="3" placeholder="🎤 Letra Voces..."></textarea>
        <textarea id="ln" rows="3" placeholder="🎹 Notas / Acordes..."></textarea>
        <button onclick="save()" class="btn-save">GUARDAR CAMBIOS ✅</button>
    </div>

    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🏍️ Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">🐢 Lentas</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    const app = firebase.initializeApp({ databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    let data = [];
    let filterR = '';

    function load() {
        db.ref('canciones').on('value', s => {
            data = [];
            s.forEach(c => { data.push({ ...c.val(), key: c.key }); });
            draw();
            updateSug(); 
        });
    }

    function updateSug() {
        const input = document.getElementById('t').value.toLowerCase();
        const sugDiv = document.getElementById('suggestions');
        sugDiv.innerHTML = '';
        if(input.length < 2) return;
        const matches = data.filter(c => c.titulo.toLowerCase().includes(input)).slice(0, 5);
        matches.forEach(m => {
            const span = document.createElement('span');
            span.className = 'sug-item';
            span.innerText = m.titulo;
            span.onclick = () => {
                document.getElementById('t').value = m.titulo;
                document.getElementById('r').value = m.ritmo;
                document.getElementById('ton').value = m.tonalidad;
                sugDiv.innerHTML = '';
            };
            sugDiv.appendChild(span);
        });
    }

    function setR(r) { 
        filterR = (filterR === r) ? '' : r; 
        document.getElementById('main-logo').innerText = filterR.toUpperCase() || 'LETRAS';
        draw(); 
    }

    function draw() {
        const list = document.getElementById('main-list');
        const query = document.getElementById('main-search').value.toLowerCase();
        list.innerHTML = '';
        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        if (!filterR && !query) { 
            list.innerHTML = '<div style="text-align:center; opacity:0.5">Elige un ritmo o busca una canción...</div>'; 
            return; 
        }

        // Filtro por Ritmo Y por Búsqueda
        let filtered = data;
        if (filterR) filtered = filtered.filter(c => c.ritmo === filterR);
        if (query) filtered = filtered.filter(c => c.titulo.toLowerCase().includes(query));

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C Mayor";
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        Object.keys(groups).sort().forEach(ton => {
            const div = document.createElement('div');
            div.className = 'tono-box' + (query ? ' open' : ''); // Auto-abrir si hay búsqueda
            div.innerHTML = `<div class="tono-title" onclick="this.parentElement.classList.toggle('open')"><span>🎶 Tono: ${ton}</span> <span>${groups[ton].length} ▾</span></div><div class="cancion-list"></div>`;
            const cList = div.querySelector('.cancion-list');
            
            groups[ton].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')">
                        <span>🎵 ${c.titulo}</span>
                        <button class="del-btn" onclick="event.stopPropagation(); borrar('${c.key}', '${c.titulo}')">🗑️</button>
                    </div>
                    <div class="item-content">
                        <div class="tabs">
                            <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                            <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || '...'}</div>
                        <div class="text-area n">${c.letraNotas || '...'}</div>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function limpiarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function save() {
        const t = document.getElementById('t').value.trim();
        const r = document.getElementById('r').value;
        const ton = document.getElementById('ton').value;
        const lv = document.getElementById('lv').value.trim();
        const ln = document.getElementById('ln').value.trim();
        if(!t) return alert("Escribe el título");
        const tLimpio = limpiarTexto(t);
        const existe = data.find(c => limpiarTexto(c.titulo) === tLimpio);

        if(existe) {
            const update = { titulo: t, ritmo: r, tonalidad: ton };
            if (lv !== "") update.letraVoces = lv;
            if (ln !== "") update.letraNotas = ln;
            db.ref('canciones/' + existe.key).update(update).then(() => { alert("Actualizada ✅"); cerrarAdmin(); });
        } else {
            db.ref('canciones').push({ titulo: t, ritmo: r, tonalidad: ton, letraVoces: lv || "...", letraNotas: ln || "..." }).then(() => { alert("Guardada ✅"); cerrarAdmin(); });
        }
    }

    function borrar(key, n) { if(confirm("¿Borrar '"+n+"'?")) db.ref('canciones/'+key).remove(); }

    function cerrarAdmin() {
        document.getElementById('admin-panel').style.display='none';
        document.getElementById('t').value = ''; document.getElementById('lv').value = ''; document.getElementById('ln').value = '';
    }

    function checkAdmin() { 
        if(prompt("Clave:") === "ipuc") {
            document.getElementById('body-app').classList.add('admin-mode');
            document.getElementById('admin-panel').style.display = 'block'; 
        }
    }
    load();
</script>
</body>
</html>
