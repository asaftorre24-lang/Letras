<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras Repertorio 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4285F4; 
            --secondary: #34A853; 
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-main: #ffffff;
            --border: #444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
            color: var(--text-main);
            /* FONDO MUSICAL PERSONALIZADO */
            background: url('https://i.ibb.co/LzNfVfG/music-bg.jpg') no-repeat center center fixed; 
            background-size: cover;
        }

        /* Capa oscura para que el texto sea legible sobre la imagen */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: -1;
        }

        header { width: 100%; text-align: center; padding: 20px 0; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .google-logo { font-size: 32px; font-weight: bold; }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #DB4437; }
        .google-logo span:nth-child(3) { color: #F4B400; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #DB4437; }

        .container { width: 100%; max-width: 600px; padding: 20px; z-index: 1; }

        .search-box { width: 100%; margin-bottom: 20px; position: relative; }
        .search-box input { 
            width: 100%; padding: 15px 15px 15px 45px; border-radius: 30px; 
            border: 2px solid #666; background: rgba(34, 34, 34, 0.9); color: white; 
            font-size: 16px; outline: none;
        }
        .search-box::before { content: '🔍'; position: absolute; left: 18px; top: 15px; font-size: 18px; opacity: 0.7; }

        .filtros { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .filter-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); background: #222; color: white; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        .tono-group { margin-bottom: 12px; border-radius: 15px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .tono-header { padding: 15px 20px; display: flex; justify-content: space-between; background: rgba(40,40,40,0.9); color: var(--secondary); font-weight: bold; cursor: pointer; }
        .tono-content { display: none; padding: 10px; }
        .tono-group.open .tono-content { display: block; }

        .cancion-item { background: #111; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--primary); }
        .cancion-header { padding: 14px; display: flex; justify-content: space-between; cursor: pointer; }
        
        .tabs-cancion { display: flex; border-top: 1px solid #333; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #222; color: #888; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: black; }
        
        .cancion-body { display: none; padding: 15px; white-space: pre-wrap; font-family: 'Courier New', monospace; background: #000; color: #fff; font-size: 15px; }
        .cancion-item.open .cancion-body.visible { display: block; }

        #admin-panel { display: none; background: #222; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--secondary); }
        .admin-trigger { position: absolute; right: 15px; top: 20px; background: none; border: 1px solid #444; color: #888; border-radius: 5px; cursor: pointer; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="google-logo"><span>L</span><span>e</span><span>t</span><span>r</span><span>a</span><span>s</span></div>
        <button class="admin-trigger" onclick="loginAdmin()">🔑 ADMIN</button>
    </header>

    <div class="container">
        <div id="admin-panel">
            <input type="text" id="titulo" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Título...">
            <button onclick="guardarLetra()" style="width:100%; padding:10px; background:var(--secondary); color:white; border:none;">Guardar</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" oninput="renderizarLista()" placeholder="Busca una canción guardada...">
        </div>

        <div class="filtros">
            <button class="filter-btn" id="btn-rapidas" onclick="cambiarRitmo('rapida', this)">🔥 Rápidas</button>
            <button class="filter-btn" id="btn-lentas" onclick="cambiarRitmo('lenta', this)">❄️ Lentas</button>
        </div>
        
        <div id="lista-tonos"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let todasLasCanciones = [];
        let ritmoActual = ''; 

        function cargarCanciones() {
            database.ref('canciones').on('value', (snapshot) => {
                todasLasCanciones = [];
                snapshot.forEach(child => { 
                    const d = child.val(); d.fKey = child.key; todasLasCanciones.push(d); 
                });
                renderizarLista();
            });
        }

        function cambiarRitmo(r, btn) {
            if (ritmoActual === r) { ritmoActual = ''; btn.classList.remove('active'); }
            else { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); ritmoActual = r; }
            renderizarLista();
        }

        function renderizarLista() {
            const listaDiv = document.getElementById('lista-tonos');
            const buscar = document.getElementById('searchInput').value.toLowerCase().trim();
            listaDiv.innerHTML = '';

            const filtradas = todasLasCanciones.filter(c => {
                const matchNombre = c.titulo.toLowerCase().includes(buscar);
                // Si hay texto en el buscador, ignoramos el filtro de ritmo para que aparezca todo
                const matchRitmo = (buscar !== "" || ritmoActual === '') ? true : c.ritmo === ritmoActual;
                return matchNombre && matchRitmo;
            });

            const grupos = {};
            filtradas.forEach(c => { if(!grupos[c.tonalidad]) grupos[c.tonalidad] = []; grupos[c.tonalidad].push(c); });

            Object.keys(grupos).sort().forEach(tono => {
                const tonoDiv = document.createElement('div');
                // Si el usuario está buscando, los grupos se abren solos automáticamente
                const isOpen = buscar !== "" ? "open" : "";
                tonoDiv.className = `tono-group ${isOpen}`;
                tonoDiv.innerHTML = `<div class="tono-header" onclick="this.parentElement.classList.toggle('open')"><span>Tono: ${tono}</span><span>${grupos[tono].length} ▾</span></div><div class="tono-content"></div>`;
                
                const content = tonoDiv.querySelector('.tono-content');
                grupos[tono].forEach(can => {
                    const canDiv = document.createElement('div');
                    canDiv.className = 'cancion-item';
                    canDiv.innerHTML = `
                        <div class="cancion-header" onclick="this.parentElement.classList.toggle('open')"><span>${can.titulo}</span></div>
                        <div class="tabs-cancion"><button id="bv-${can.id}" class="tab-btn active" onclick="tab('${can.id}','v')">Voces</button><button id="bn-${can.id}" class="tab-btn" onclick="tab('${can.id}','n')">Nota</button></div>
                        <div id="v-${can.id}" class="cancion-body visible">${can.letraVoces || ''}</div>
                        <div id="n-${can.id}" class="cancion-body">${can.letraNotas || ''}</div>`;
                    content.appendChild(canDiv);
                });
                listaDiv.appendChild(tonoDiv);
            });
        }

        function tab(id, t) {
            const v = document.getElementById('v-'+id); const n = document.getElementById('n-'+id);
            const bv = document.getElementById('bv-'+id); const bn = document.getElementById('bn-'+id);
            if(t==='v'){ v.classList.add('visible'); n.classList.remove('visible'); bv.classList.add('active'); bn.classList.remove('active'); }
            else { v.classList.remove('visible'); n.classList.add('visible'); bv.classList.remove('active'); bn.classList.add('active'); }
        }

        function loginAdmin() { if(prompt("Clave:") === "1234") document.getElementById('admin-panel').style.display = 'block'; }

        cargarCanciones();
    </script>
</body>
</html>
