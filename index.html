<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras Repertorio 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4285F4; 
            /* --- NUEVO FONDO MUSICAL --- */
            /* Reemplazamos el negro sólido por una imagen de fondo sutil */
            --bg-base: #121212; /* Base oscura */
            --bg-music-pattern: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="30" font-family="serif" font-size="20" fill="rgba(255,255,255,0.03)">♩</text><text x="50" y="20" font-family="serif" font-size="25" fill="rgba(255,255,255,0.03)">♪</text><text x="80" y="40" font-family="serif" font-size="18" fill="rgba(255,255,255,0.03)">♫</text><text x="30" y="60" font-family="serif" font-size="22" fill="rgba(255,255,255,0.03)">♬</text><text x="70" y="70" font-family="serif" font-size="28" fill="rgba(255,255,255,0.03)">𝄞</text><text x="20" y="90" font-family="serif" font-size="16" fill="rgba(255,255,255,0.03)">♭</text><text x="60" y="95" font-family="serif" font-size="24" fill="rgba(255,255,255,0.03)">♯</text></svg>');
            
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border: #333333;
            --secondary: #34A853; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Aplicamos el fondo base y el patrón musical sutil */
            background-color: var(--bg-base);
            background-image: var(--bg-music-pattern);
            background-repeat: repeat;
            background-attachment: fixed; /* Mantiene el fondo quieto al hacer scroll */
            color: var(--text-main); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
        }

        header { width: 100%; text-align: center; padding: 25px 0; background: rgba(0,0,0,0.8); position: relative; border-bottom: 1px solid var(--border); backdrop-filter: blur(5px); }
        .google-logo { font-size: 35px; font-weight: bold; }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #DB4437; }
        .google-logo span:nth-child(3) { color: #F4B400; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #DB4437; }

        .admin-trigger { position: absolute; right: 15px; top: 25px; background: none; border: 1px solid #333; color: #555; border-radius: 5px; padding: 5px; font-size: 10px; cursor: pointer; }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        /* BUSCADOR ESTILO GOOGLE */
        .search-box { width: 100%; margin-bottom: 20px; position: relative; }
        .search-box input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 30px; border: 1px solid #555; background: #222; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(66, 133, 244, 0.3); }
        .search-box::before { content: '🔍'; position: absolute; left: 18px; top: 15px; font-size: 18px; opacity: 0.5; }

        .filtros { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .filter-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); background: #222; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        /* LISTADO POR TONOS */
        .tono-group { margin-bottom: 12px; border-radius: 15px; overflow: hidden; background: rgba(26, 26, 26, 0.9); border: 1px solid var(--border); }
        .tono-header { padding: 15px 20px; display: flex; justify-content: space-between; background: #252525; color: var(--secondary); font-weight: bold; cursor: pointer; }
        .tono-content { display: none; padding: 10px; background: rgba(0,0,0,0.8); }
        .tono-group.open .tono-content { display: block; }

        .cancion-item { background: #1e1e1e; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--primary); overflow: hidden; }
        .cancion-header { padding: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 15px; }
        
        .tabs-cancion { display: flex; border-top: 1px solid #333; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #111; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: black; }
        
        .cancion-body { display: none; padding: 15px; white-space: pre-wrap; font-family: 'Courier New', monospace; color: #fff; background: #000; font-size: 15px; line-height: 1.4; }
        .cancion-item.open .cancion-body.visible { display: block; }

        #admin-panel { display: none; background: #222; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--secondary); }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #333; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="google-logo"><span>L</span><span>e</span><span>t</span><span>r</span><span>a</span><span>s</span></div>
        <button class="admin-trigger" onclick="loginAdmin()">🔑 ADMIN</button>
    </header>

    <div class="container">
        
        <div id="admin-panel">
            <input type="text" id="titulo" placeholder="Nombre de la canción...">
            <div style="display:flex; gap:10px;">
                <select id="ritmo" style="flex:1;"><option value="rapida">🔥 Rápida</option><option value="lenta">❄️ Lenta</option></select>
                <select id="tonalidad" style="flex:1;"><option value="C">Do (C)</option><option value="D">Re (D)</option><option value="E">Mi (E)</option><option value="F">Fa (F)</option><option value="G">Sol (G)</option><option value="A">La (A)</option><option value="B">Si (B)</option></select>
            </div>
            <textarea id="letraVoces" rows="4" placeholder="Letra Voces..."></textarea>
            <textarea id="letraNotas" rows="4" placeholder="Letra Notas..."></textarea>
            <button onclick="guardarLetra()" style="width:100%; padding:15px; background:var(--secondary); border:none; border-radius:10px; font-weight:bold;">GUARDAR ☁️</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" oninput="renderizarLista()" placeholder="Busca una canción...">
        </div>

        <div class="filtros">
            <button class="filter-btn" id="btn-rapidas" onclick="cambiarRitmo('rapida', this)">🔥 Rápidas</button>
            <button class="filter-btn" id="btn-lentas" onclick="cambiarRitmo('lenta', this)">❄️ Lentas</button>
        </div>
        
        <div id="lista-tonos"></div>
    </div>

    <script>
        const CLAVE_MAESTRA = "1234"; 
        let todasLasCanciones = [];
        let ritmoActual = ''; 
        let modoAdmin = false;

        const firebaseConfig = { databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function organizarTexto(t) { return t.split('\n').map(l => l.trim()).filter(l => l !== "").join('\n'); }

        function loginAdmin() {
            if(prompt("Clave:") === CLAVE_MAESTRA) { 
                modoAdmin = true; 
                document.getElementById('admin-panel').style.display = 'block'; 
                renderizarLista();
            }
        }

        function guardarLetra() {
            const t = document.getElementById('titulo').value.trim();
            const r = document.getElementById('ritmo').value;
            const ton = document.getElementById('tonalidad').value;
            const v = organizarTexto(document.getElementById('letraVoces').value);
            const n = organizarTexto(document.getElementById('letraNotas').value);
            if (t) {
                database.ref('canciones').push({ id: Date.now(), titulo: t, ritmo: r, tonalidad: ton, letraVoces: v, letraNotas: n })
                .then(() => { alert("Guardado"); location.reload(); });
            }
        }

        function cambiarRitmo(r, btn) {
            if (ritmoActual === r) { ritmoActual = ''; btn.classList.remove('active'); }
            else { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); ritmoActual = r; }
            renderizarLista();
        }

        function cargarCanciones() {
            database.ref('canciones').on('value', (snapshot) => {
                todasLasCanciones = [];
                snapshot.forEach(child => { 
                    const d = child.val(); d.fKey = child.key; todasLasCanciones.push(d); 
                });
                renderizarLista();
            });
        }

        function renderizarLista() {
            const listaDiv = document.getElementById('lista-tonos');
            const buscar = document.getElementById('searchInput').value.toLowerCase().trim();
            listaDiv.innerHTML = '';

            const filtradas = todasLasCanciones.filter(c => {
                const matchNombre = c.titulo.toLowerCase().includes(buscar);
                const matchRitmo = ritmoActual === '' ? true : c.ritmo === ritmoActual;
                return matchNombre && matchRitmo;
            });

            const grupos = {};
            filtradas.forEach(c => { if(!grupos[c.tonalidad]) grupos[c.tonalidad] = []; grupos[c.tonalidad].push(c); });

            Object.keys(grupos).sort().forEach(tono => {
                const tonoDiv = document.createElement('div');
                const isOpen = buscar !== "" ? "open" : "";
                tonoDiv.className = `tono-group ${isOpen}`;
                tonoDiv.innerHTML = `<div class="tono-header" onclick="this.parentElement.classList.toggle('open')"><span>Tono: ${tono}</span><span>${grupos[tono].length} ▾</span></div><div class="tono-content"></div>`;
                const content = tonoDiv.querySelector('.tono-content');

                grupos[tono].forEach(can => {
                    const canDiv = document.createElement('div');
                    canDiv.className = 'cancion-item';
                    canDiv.innerHTML = `
                        <div class="cancion-header" onclick="this.parentElement.classList.toggle('open')"><span>${can.titulo}</span>${modoAdmin ? `<button onclick="event.stopPropagation(); eliminar('${can.fKey}')" style="color:red; background:none; border:none;">✕</button>` : ''}</div>
                        <div class="tabs-cancion"><button id="bv-${can.id}" class="tab-btn active" onclick="tab('${can.id}','v')">Voces</button><button id="bn-${can.id}" class="tab-btn" onclick="tab('${can.id}','n')">Nota</button></div>
                        <div id="v-${can.id}" class="cancion-body visible Courier New, monospace">${can.letraVoces || ''}</div>
                        <div id="n-${can.id}" class="cancion-body Courier New, monospace">${can.letraNotas || ''}</div>`;
                    content.appendChild(canDiv);
                });
                listaDiv.appendChild(tonoDiv);
            });
        }

        function tab(id, t) {
            const v = document.getElementById('v-'+id); const n = document.getElementById('n-'+id);
            const bv = document.getElementById('bv-'+id); const bn = document.getElementById('bn-'+id);
            if(t==='v'){ v.classList.add('visible'); n.classList.remove('visible'); bv.classList.add('active'); bn.classList.remove('active'); }
            else { v.classList.remove('visible'); n.classList.add('visible'); bv.classList.remove('active'); bn.classList.add('active'); }
        }

        function eliminar(k) { if(confirm("¿Eliminar?")) database.ref('canciones/'+k).remove(); }
        
        cargarCanciones();
    </script>
</body>
</html>
