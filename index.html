<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --blue: #4285F4; --green: #34A853; --bg: #000; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; text-align: center; padding: 20px; position: relative; }
        .logo { font-size: 32px; font-weight: bold; }
        .logo span:nth-child(1) { color: var(--blue); }
        .logo span:nth-child(2) { color: var(--green); }
        .admin-btn { position: absolute; right: 10px; top: 20px; background: transparent; color: #888; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .container { width: 95%; max-width: 500px; padding: 20px 0; }
        
        #admin-panel { display: none; border: 2px solid var(--green); border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #0a0a0a; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; font-size: 16px; box-sizing: border-box; }
        
        .filter-group { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .f-btn { flex: 1; padding: 15px; border-radius: 20px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        .f-btn.active { background: var(--blue); }

        .tono-box { background: #1a1a1a; border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .tono-title { padding: 15px; color: var(--green); font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #333; }
        .cancion-list { display: none; padding: 10px; }
        .tono-box.open .cancion-list { display: block; }

        .item { background: #222; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid var(--blue); }
        .item-head { padding: 15px; cursor: pointer; }
        .item-content { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .item.open .item-content { display: block; }
        
        .tabs { display: flex; margin-bottom: 10px; border-radius: 5px; overflow: hidden; background: #333; }
        .t-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #888; cursor: pointer; }
        .t-btn.active { background: var(--green); color: black; font-weight: bold; }
        .text-area { white-space: pre-wrap; font-family: monospace; font-size: 17px; line-height: 1.6; display: none; padding: 10px 0; }
        .text-area.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>Le</span><span>tras</span></div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <div id="admin-panel">
        <input type="text" id="t" placeholder="Nombre de la canción...">
        <div style="display:flex; gap:10px;">
            <select id="r"><option value="rapida">🔥 Rápida</option><option value="lenta">❄️ Lenta</option></select>
            <select id="ton"><option value="C">Do (C)</option><option value="D">Re (D)</option><option value="E">Mi (E)</option><option value="F">Fa (F)</option><option value="G">Sol (G)</option><option value="A">La (A)</option><option value="B">Si (B)</option></select>
        </div>
        <textarea id="lv" rows="4" placeholder="Letra Voces..."></textarea>
        <textarea id="ln" rows="4" placeholder="Letra Notas..."></textarea>
        <button onclick="save()" style="width:100%; padding:15px; background:var(--green); border:none; color:white; font-weight:bold; border-radius:10px; cursor:pointer;">GUARDAR ☁️</button>
    </div>

    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🔥 Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">❄️ Lentas</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    const app = firebase.initializeApp({ databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    let data = [];
    let filterR = '';
    const ordenMusical = ["C", "D", "E", "F", "G", "A", "B"];

    function load() {
        // Recuperar filtro guardado
        const savedFilter = localStorage.getItem('filtroRitmo_Letras');
        if (savedFilter) { filterR = savedFilter; }

        db.ref('canciones').on('value', s => {
            data = [];
            s.forEach(c => { data.push({ ...c.val(), key: c.key }); });
            draw();
        });
    }

    function setR(r) {
        if (filterR === r) {
            filterR = '';
            localStorage.removeItem('filtroRitmo_Letras');
        } else {
            filterR = r;
            localStorage.setItem('filtroRitmo_Letras', r);
        }
        draw();
    }

    function draw() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';

        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        const filtered = data.filter(c => {
            return (filterR === '' || c.ritmo === filterR);
        });

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C";
            if(t === "undefined") t = "C"; 
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        // Orden musical C, D, E, F, G, A, B
        const tonosOrdenados = Object.keys(groups).sort((a, b) => {
            return ordenMusical.indexOf(a) - ordenMusical.indexOf(b);
        });

        tonosOrdenados.forEach(ton => {
            const div = document.createElement('div');
            div.className = 'tono-box';
            div.innerHTML = `<div class="tono-title" onclick="this.parentElement.classList.toggle('open')">
                <span>Tono: ${ton}</span> <span>${groups[ton].length} ▾</span>
            </div>
            <div class="cancion-list"></div>`;
            
            const cList = div.querySelector('.cancion-list');
            groups[ton].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')">${c.titulo}</div>
                    <div class="item-content">
                        <div class="tabs">
                            <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                            <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || ''}</div>
                        <div class="text-area n">${c.letraNotas || ''}</div>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function save() {
        const t = document.getElementById('t').value.trim();
        if(!t) return alert("Escribe un título");
        db.ref('canciones').push({
            titulo: t, 
            ritmo: document.getElementById('r').value,
            tonalidad: document.getElementById('ton').value,
            letraVoces: document.getElementById('lv').value,
            letraNotas: document.getElementById('ln').value
        }).then(() => {
            alert("Guardado");
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('t').value = '';
            document.getElementById('lv').value = '';
            document.getElementById('ln').value = '';
        });
    }

    function checkAdmin() { if(prompt("Clave:") === "1234") document.getElementById('admin-panel').style.display = 'block'; }
    load();
</script>
</body>
</html>
