<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras PRO 🎵</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">

    <style>
        :root { 
            --blue: #4285F4; 
            --green: #34A853; 
            --bg: #000; 
            --card: #1a1a1a; 
            --text: #eee;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Fondo Negro Sólido */
            background: var(--bg); 
            /* Fondo con patrón de notas musicales sutil */
            background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 50px 50px, 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }

        header { 
            width: 100%; text-align: center; padding: 25px 0; 
            background: rgba(0,0,0,0.8); position: relative; border-bottom: 1px solid #222;
            backdrop-filter: blur(5px); z-index: 10;
        }

        /* Título Estilizado como notas musicales */
        .logo { 
            font-family: 'Major Mono Display', monospace; /* Tipografía más rítmica y estilizada */
            font-size: 36px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(66, 133, 244, 0.4);
            /* Degradado de azul a verde para el título completo */
            background: linear-gradient(to right, var(--blue), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-btn { 
            position: absolute; right: 15px; top: 25px; 
            background: rgba(255,255,255,0.02); color: #555; 
            border: 1px solid #333; padding: 7px 14px; border-radius: 8px; 
            font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .admin-btn:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: #555; }
        
        .container { width: 92%; max-width: 500px; padding: 20px 0; position: relative; z-index: 5; }
        
        #admin-panel { 
            display: none; border: 2px solid var(--green); 
            border-radius: 20px; padding: 20px; 
            margin-bottom: 25px; background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        input, textarea, select { 
            width: 100%; margin-bottom: 12px; padding: 14px; 
            border-radius: 12px; border: 1px solid #333; 
            background: #111; color: white; font-size: 16px;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--blue); background: #000; }
        
        .filter-group { 
            display: flex; gap: 15px; margin-bottom: 30px; 
            justify-content: center;
        }

        .f-btn { 
            flex: 1; padding: 15px; border-radius: 20px; 
            border: 1px solid #333; background: rgba(34,34,34,0.5); 
            color: white; cursor: pointer; font-weight: bold; 
            font-size: 16px; transition: 0.3s;
        }
        .f-btn:hover { background: #333; border-color: #555; }

        .f-btn.active { 
            background: var(--blue);
            border-color: var(--blue);
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
        }

        .tono-box { 
            background: rgba(26,26,26,0.7); border-radius: 18px; 
            margin-bottom: 15px; overflow: hidden; 
            border: 1px solid #222; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .tono-box:hover { border-color: #444; }

        .tono-title { 
            padding: 20px; background: rgba(26,26,26,0.9); color: var(--green); 
            font-weight: bold; display: flex; justify-content: space-between; 
            cursor: pointer; font-size: 18px;
        }

        .cancion-list { display: none; padding: 12px; background: rgba(17,17,17,0.5); }
        .tono-box.open .cancion-list { display: block; }

        .item { 
            background: rgba(34,34,34,0.8); margin-bottom: 12px; 
            border-radius: 12px; border-left: 5px solid var(--blue); 
            transition: 0.2s;
        }
        .item:hover { background: #222; transform: translateX(3px); }

        .item-head { padding: 18px; cursor: pointer; font-size: 16px; }
        
        .item-content { display: none; padding: 15px; background: rgba(0,0,0,0.8); border-top: 1px solid #333; }
        .item.open .item-content { display: block; }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 8px; overflow: hidden; background: #333; }
        .t-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #999; cursor: pointer; font-weight: bold; }
        .t-btn.active { background: var(--green); color: black; }
        
        .text-area { 
            white-space: pre-wrap; font-family: monospace; 
            font-size: 18px; line-height: 1.6; display: none; 
            padding: 10px; color: #eee;
        }
        .text-area.active { display: block; }

        .btn-save { 
            width: 100%; padding: 18px; background: var(--green); 
            border: none; color: white; font-weight: bold; 
            border-radius: 15px; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .btn-save:hover { background: #2c8c4c; box-shadow: 0 0 20px rgba(52, 168, 83, 0.3); }
    </style>
</head>
<body>

<header>
    <div class="logo">Letras</div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <div id="admin-panel">
        <input type="text" id="t" placeholder="🎵 Nombre de la canción...">
        <div style="display:flex; gap:10px;">
            <select id="r">
                <option value="rapida">🔥 Rápida</option>
                <option value="lenta">❄️ Lenta</option>
            </select>
            <select id="ton">
                <option value="C">Do (C)</option><option value="C#">Do# (C#)</option>
                <option value="Db">Reb (Db)</option><option value="D">Re (D)</option><option value="D#">Re# (D#)</option>
                <option value="Eb">Mib (Eb)</option><option value="E">Mi (E)</option>
                <option value="F">Fa (F)</option><option value="F#">Fa# (F#)</option>
                <option value="Gb">Solb (Gb)</option><option value="G">Sol (G)</option><option value="G#">Sol# (G#)</option>
                <option value="Ab">Lab (Ab)</option><option value="A">La (A)</option><option value="A#">La# (A#)</option>
                <option value="Bb">Sib (Bb)</option><option value="B">Si (B)</option>
            </select>
        </div>
        <textarea id="lv" rows="4" placeholder="🎤 Letra Voces..."></textarea>
        <textarea id="ln" rows="4" placeholder="🎹 Letra Notas..."></textarea>
        <button onclick="save()" class="btn-save">GUARDAR CANCIÓN ☁️</button>
    </div>

    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🔥 Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">❄️ Lentas</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    // Tu configuración de Firebase
    const app = firebase.initializeApp({ databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    let data = [];
    let filterR = '';
    // Orden musical cromático completo
    const ordenMusical = [
        "C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#", "Ab", "A", "A#", "Bb", "B"
    ];

    function load() {
        // Recuperar filtro guardado (Memoria)
        const savedFilter = localStorage.getItem('filtroRitmo_Letras');
        if (savedFilter) { filterR = savedFilter; }

        db.ref('canciones').on('value', s => {
            data = [];
            s.forEach(c => { data.push({ ...c.val(), key: c.key }); });
            draw();
        });
    }

    function setR(r) {
        if (filterR === r) {
            filterR = '';
            localStorage.removeItem('filtroRitmo_Letras');
        } else {
            filterR = r;
            localStorage.setItem('filtroRitmo_Letras', r);
        }
        draw();
    }

    function draw() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';

        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        const filtered = data.filter(c => {
            return (filterR === '' || c.ritmo === filterR);
        });

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C";
            if(t === "undefined") t = "C"; 
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        // Ordenar tonos musicalmente
        const tonosOrdenados = Object.keys(groups).sort((a, b) => {
            return ordenMusical.indexOf(a) - ordenMusical.indexOf(b);
        });

        tonosOrdenados.forEach(ton => {
            const div = document.createElement('div');
            div.className = 'tono-box'; // Cerrado por defecto
            div.innerHTML = `
                <div class="tono-title" onclick="this.parentElement.classList.toggle('open')">
                    <span>🎶 Tono: ${ton}</span> <span>${groups[ton].length} ▾</span>
                </div>
                <div class="cancion-list"></div>`;
            
            const cList = div.querySelector('.cancion-list');
            groups[ton].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')">🎵 ${c.titulo}</div>
                    <div class="item-content">
                        <div class="tabs">
                            <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                            <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || 'Sin letra'}</div>
                        <div class="text-area n">${c.letraNotas || 'Sin notas'}</div>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function save() {
        const t = document.getElementById('t').value.trim();
        if(!t) return alert("Escribe un título");
        db.ref('canciones').push({
            titulo: t, 
            ritmo: document.getElementById('r').value,
            tonalidad: document.getElementById('ton').value,
            letraVoces: document.getElementById('lv').value,
            letraNotas: document.getElementById('ln').value
        }).then(() => {
            alert("¡Canción guardada!");
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('t').value = '';
            document.getElementById('lv').value = '';
            document.getElementById('ln').value = '';
        });
    }

    function checkAdmin() { if(prompt("Clave:") === "1234") document.getElementById('admin-panel').style.display = 'block'; }
    load();
</script>
</body>
</html>
