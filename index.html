<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras PRO 🎵</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Letras IPUC">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png?v=final">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844720.png?v=final">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #4285F4; --green: #34A853; --red: #ea4335; --bg: #000000; --text: #eee; }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='50%25' y='50%25' font-family='Arial' font-size='60' fill='rgba(66, 133, 244, 0.08)' text-anchor='middle' dominant-baseline='middle'%3E𝄞%3C/text%3E%3C/svg%3E");
            background-position: center; background-repeat: no-repeat; background-attachment: fixed; 
            color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { width: 100%; text-align: center; padding: 25px 0; background: rgba(0,0,0,0.85); position: relative; border-bottom: 1px solid #222; backdrop-filter: blur(10px); z-index: 10; }
        .logo { font-family: 'Major Mono Display', monospace; font-size: 38px; font-weight: bold; letter-spacing: 3px; background: linear-gradient(to right, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-btn { position: absolute; right: 15px; top: 25px; background: rgba(255,255,255,0.05); color: #666; border: 1px solid #333; padding: 7px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .container { width: 92%; max-width: 500px; padding: 20px 0; z-index: 5; }
        
        #main-search { width: 100%; padding: 15px; text-align: center; border-radius: 25px; border: 1px solid #333; background: rgba(21, 21, 21, 0.9); color: white; font-size: 16px; outline: none; box-sizing: border-box; backdrop-filter: blur(5px); margin-bottom: 20px; }

        .div-title { margin: 30px 0 15px; padding: 10px; color: var(--blue); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(66, 133, 244, 0.2); width: 100%; text-align: center; }

        #admin-panel { display: none; border: 2px solid var(--green); border-radius: 20px; padding: 20px; margin-bottom: 25px; background: rgba(10,10,10,0.98); }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; box-sizing: border-box; }
        
        .filter-group { display: flex; gap: 15px; margin-bottom: 35px; justify-content: center; }
        .f-btn { flex: 1; padding: 18px; border-radius: 22px; border: 1px solid #333; background: rgba(40,40,40,0.7); color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        .f-btn.active { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 20px rgba(66, 133, 244, 0.4); }
        
        .tono-box { background: rgba(30,30,30,0.8); border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; overflow: hidden; }
        .tono-title { padding: 20px; color: var(--green); font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .cancion-list { display: none; padding: 12px; }
        .tono-box.open .cancion-list { display: block; }
        
        .item { background: rgba(45,45,45,0.95); margin-bottom: 12px; border-radius: 12px; border-left: 5px solid var(--blue); position: relative; }
        .item-head { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; padding-right: 50px; }
        .item-content { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .item.open .item-content { display: block; }
        
        /* BOTONES ADMIN */
        .del-total { display: none; position: absolute; right: 10px; top: 15px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 15; }
        .clean-section { display: none; background: var(--red); color: white; border: none; border-radius: 5px; padding: 4px 8px; font-size: 10px; cursor: pointer; margin-left: 10px; }
        body.admin-mode .del-total, body.admin-mode .clean-section { display: inline-block; }

        .tabs { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
        .tabs-btns { flex: 1; display: flex; border-radius: 10px; overflow: hidden; background: #222; }
        .t-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #777; cursor: pointer; font-weight: bold; }
        .t-btn.active { background: var(--green); color: black; }
        
        .text-area { white-space: pre-wrap; font-family: 'Times New Roman', serif; font-size: 20px; display: none; padding: 10px; color: #fff; line-height: 1.5; }
        .text-area.active { display: block; }
    </style>
</head>
<body id="body-app">

<header>
    <div class="logo" id="main-logo">LETRAS</div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <input type="text" id="main-search" placeholder="🔍 Buscar canción..." oninput="draw()">

    <div id="admin-panel">
        <input type="text" id="t" placeholder="🎵 Título de la canción...">
        <div style="display:flex; gap:10px;">
            <select id="r">
                <option value="rapida">🏍️ Rápida</option>
                <option value="lenta">🐢 Lenta</option>
            </select>
            <select id="ton">
                <optgroup label="Mayores">
                    <option value="C Mayor">Do (C)</option><option value="D Mayor">Re (D)</option>
                    <option value="E Mayor">Mi (E)</option><option value="F Mayor">Fa (F)</option>
                    <option value="G Mayor">Sol (G)</option><option value="A Mayor">La (A)</option>
                    <option value="B Mayor">Si (B)</option>
                </optgroup>
                <optgroup label="Menores">
                    <option value="Cm Menor">Do m (Cm)</option><option value="Dm Menor">Re m (Dm)</option>
                    <option value="Em Menor">Mi m (Em)</option><option value="Fm Menor">Fa m (Fm)</option>
                    <option value="Gm Menor">Sol m (Gm)</option><option value="Am Menor">La m (Am)</option>
                    <option value="Bm Menor">Si m (Bm)</option>
                </optgroup>
            </select>
        </div>
        <textarea id="lv" rows="3" placeholder="🎤 Letra Voces..."></textarea>
        <textarea id="ln" rows="3" placeholder="🎹 Notas / Acordes..."></textarea>
        <button onclick="save()" style="width:100%; padding:18px; background:var(--green); border:none; border-radius:12px; color:white; font-weight:bold;">💾 GUARDAR TODO</button>
    </div>

    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🏍️ Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">🐢 Lentas</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    const app = firebase.initializeApp({ databaseURL: "https://canciones-56abc-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    let data = [];
    let filterR = '';

    function load() {
        db.ref('canciones').on('value', s => {
            data = [];
            s.forEach(c => { data.push({ ...c.val(), key: c.key }); });
            draw();
        });
    }

    function setR(r) { 
        filterR = (filterR === r) ? '' : r; 
        document.getElementById('main-logo').innerText = filterR.toUpperCase() || 'LETRAS';
        draw(); 
    }

    function draw() {
        const list = document.getElementById('main-list');
        const query = document.getElementById('main-search').value.toLowerCase();
        list.innerHTML = '';
        
        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        if (!filterR && !query) return;

        let filtered = data.filter(c => (!filterR || c.ritmo === filterR) && (!query || c.titulo.toLowerCase().includes(query)));

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C Mayor";
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        Object.keys(groups).sort().forEach(t => {
            const esMenor = t.toLowerCase().includes('menor');
            const match = t.match(/\(([^)]+)\)/);
            let cifrado = match ? match[1] : t;
            cifrado = cifrado.replace(/menor|mayor/gi, '').trim();
            let displayTon = esMenor ? (cifrado.toLowerCase().endsWith('m') ? cifrado : cifrado + 'm') : cifrado;

            const div = document.createElement('div');
            div.className = 'tono-box' + (query ? ' open' : '');
            div.innerHTML = `<div class="tono-title" onclick="this.parentElement.classList.toggle('open')"><span>🎶 ${displayTon}</span> <span>${groups[t].length} ▾</span></div><div class="cancion-list"></div>`;
            const cList = div.querySelector('.cancion-list');
            
            groups[t].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item' + (query && c.titulo.toLowerCase().includes(query) ? ' open' : '');
                item.innerHTML = `
                    <button class="del-total" onclick="remove('${c.key}')">🗑️</button>
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')"><span>🎵 ${c.titulo}</span></div>
                    <div class="item-content">
                        <div class="tabs">
                            <div class="tabs-btns">
                                <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                                <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                            </div>
                            <button class="clean-section" onclick="clearSec('${c.key}', 'letraVoces')">🧹 Limpiar Voces</button>
                            <button class="clean-section" onclick="clearSec('${c.key}', 'letraNotas')">🧹 Limpiar Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || '...'}</div>
                        <div class="text-area n">${c.letraNotas || '...'}</div>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function checkAdmin() { 
        if(prompt("Clave:") === "ipuc") {
            document.getElementById('admin-panel').style.display = 'block';
            document.body.classList.add('admin-mode');
        } 
    }
    
    function clearSec(key, field) {
        if(confirm("¿Borrar solo esta sección?")) {
            let updates = {};
            updates[field] = "...";
            db.ref('canciones/' + key).update(updates);
        }
    }

    function remove(key) {
        if(confirm("¿Borrar toda la canción?")) db.ref('canciones/' + key).remove();
    }

    function save() {
        db.ref('canciones').push({
            titulo: document.getElementById('t').value, ritmo: document.getElementById('r').value,
            tonalidad: document.getElementById('ton').value, letraVoces: document.getElementById('lv').value,
            letraNotas: document.getElementById('ln').value
        }).then(() => { alert("Guardado"); location.reload(); });
    }

    load();
</script>
</body>
</html>
