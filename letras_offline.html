<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letras PRO 🎵 (OFFLINE)</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Fira+Code:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --blue: #4285F4; 
            --green: #34A853; 
            --gold: #f1c40f;
            --bg: #0d0e12; 
            --card-bg: #161820;
            --text: #f0f0f0; 
            --text-dim: #a0a0a0;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg);
            background-image: linear-gradient(rgba(13, 14, 18, 0.95), rgba(13, 14, 18, 0.95)), url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            background-attachment: fixed;
            color: var(--text); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .music-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='Arial' font-size='20' fill='white'%3E♩%3C/text%3E%3Ctext x='50' y='80' font-family='Arial' font-size='25' fill='white'%3E♫%3C/text%3E%3Ctext x='80' y='40' font-family='Arial' font-size='18' fill='white'%3E♬%3C/text%3E%3C/svg%3E");
        }

        header { 
            width: 100%; text-align: center; padding: 18px 0; 
            background: rgba(10, 10, 15, 0.85); position: sticky; top: 0;
            border-bottom: 1px solid #252836; backdrop-filter: blur(12px); z-index: 100; 
        }
        .logo { 
            font-family: 'Major Mono Display', monospace; font-size: 32px; font-weight: bold; 
            letter-spacing: 2px; background: linear-gradient(to right, var(--blue), var(--green)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .admin-btn { 
            position: absolute; right: 15px; top: 16px; background: rgba(255,255,255,0.05); 
            color: #aaa; border: 1px solid #333; padding: 8px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; 
        }

        .container { width: 92%; max-width: 550px; padding: 15px 0 100px 0; z-index: 5; }

        /* Panel Admin */
        #admin-panel { 
            display: none; border: 2px solid var(--green); border-radius: 20px; 
            padding: 20px; margin-bottom: 25px; background: rgba(15,18,25,0.98); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        input, textarea, select { 
            width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px; 
            border: 1px solid #2a2d3d; background: #0f1015; color: white; font-size: 15px; box-sizing: border-box; 
            outline: none; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--blue); }

        /* Buscador */
        .search-box input { 
            border-color: #2a2d3d; border-radius: 16px; background: rgba(22,24,32,0.8);
            padding-left: 18px; font-size: 16px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Filtros */
        .filter-group { display: flex; gap: 12px; margin-bottom: 20px; }
        .f-btn { 
            flex: 1; padding: 14px; border-radius: 16px; border: 1px solid #2a2d3d; 
            background: var(--card-bg); color: #ccc; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; 
        }
        .f-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3); }

        /* Tonalidad Box */
        .tono-box { background: var(--card-bg); border-radius: 16px; margin-bottom: 15px; border: 1px solid #222533; overflow: hidden; }
        .tono-title { padding: 16px 20px; color: var(--green); font-weight: 700; display: flex; justify-content: space-between; cursor: pointer; user-select: none; }
        .cancion-list { display: none; padding: 10px 12px 12px 12px; }
        .tono-box.open .cancion-list { display: block; }

        /* Canción Item */
        .item { background: #1c1f2b; margin-bottom: 10px; border-radius: 12px; border-left: 4px solid var(--blue); position: relative; }
        .item-head { padding: 16px; cursor: pointer; font-weight: 600; font-size: 16px; padding-right: 90px; }
        
        .actions-btn { position: absolute; right: 10px; top: 12px; display: flex; gap: 6px; }
        .btn-action { border: none; color: white; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #2b3040; border: 1px solid #3f465e; }
        .btn-del { background: #501d1d; }

        .item-content { display: none; padding: 15px; background: #0a0b0e; border-top: 1px solid #222533; border-radius: 0 0 12px 12px; }
        .item.open .item-content { display: block; }
        
        /* Toolbar del Visor */
        .visor-tools { 
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; 
            gap: 10px; background: #14161f; padding: 10px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #222533;
        }
        .tool-group { display: flex; align-items: center; gap: 6px; }
        .tool-btn { 
            background: #222636; border: 1px solid #33384f; color: #fff; padding: 6px 10px; 
            border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; 
        }
        .tool-btn:active { background: var(--blue); }

        .tabs { display: flex; border-radius: 8px; overflow: hidden; background: #1a1d29; margin-bottom: 12px; }
        .t-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #777; cursor: pointer; font-weight: bold; font-size: 13px; }
        .t-btn.active { background: var(--green); color: black; }
        
        /* Área de Texto Musical */
        .text-area { 
            white-space: pre-wrap; font-family: 'Fira Code', monospace; font-size: 17px; 
            line-height: 1.6; display: none; padding: 8px; color: #fff; overflow-x: auto;
        }
        .text-area.active { display: block; }

        .btn-save { width: 100%; padding: 16px; background: var(--green); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 16px; }

        /* Barra de Copia de Seguridad Siempre Visible */
        .backup-bar { 
            margin-top: 30px; padding: 15px; background: rgba(22, 24, 32, 0.9); 
            border: 1px solid #2a2d3d; border-radius: 16px; text-align: center;
        }
        .backup-title { font-size: 13px; color: #aaa; margin-bottom: 10px; font-weight: 600; }
        .backup-group { display: flex; gap: 10px; }
        .btn-backup { flex: 1; padding: 12px; background: #1a1d29; border: 1px solid #33384f; color: #fff; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-backup:active { background: var(--blue); }

        .empty-state { text-align: center; color: #666; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

<div class="music-bg"></div>

<header>
    <div class="logo">Letras</div>
    <button class="admin-btn" onclick="checkAdmin()">🔑 ADMIN</button>
</header>

<div class="container">
    <!-- Panel Administrador -->
    <div id="admin-panel">
        <h3 id="panel-title" style="margin-top:0; color:var(--green);">Añadir Canción</h3>
        <input type="hidden" id="edit-id" value="">
        <input type="text" id="t" placeholder="🎵 Nombre de la canción...">
        <div style="display:flex; gap:10px;">
            <select id="r">
                <option value="rapida">🏍️ Rápida</option>
                <option value="lenta">🐢 Lenta</option>
            </select>
            <select id="ton">
                <option value="C">Do Mayor (C)</option><option value="Cm">Do Menor (Cm)</option>
                <option value="C#">Do# Mayor (C#)</option><option value="C#m">Do# Menor (C#m)</option>
                <option value="D">Re Mayor (D)</option><option value="Dm">Re Menor (Dm)</option>
                <option value="Eb">Mi b Mayor (Eb)</option><option value="Ebm">Mi b Menor (Ebm)</option>
                <option value="E">Mi Mayor (E)</option><option value="Em">Mi Menor (Em)</option>
                <option value="F">Fa Mayor (F)</option><option value="Fm">Fa Menor (Fm)</option>
                <option value="F#">Fa# Mayor (F#)</option><option value="F#m">Fa# Menor (F#m)</option>
                <option value="G">Sol Mayor (G)</option><option value="Gm">Sol Menor (Gm)</option>
                <option value="Ab">Sol# / La b Mayor</option><option value="Abm">Sol# / La b Menor</option>
                <option value="A">La Mayor (A)</option><option value="Am">La Menor (Am)</option>
                <option value="Bb">Si b Mayor (Bb)</option><option value="Bbm">Si b Menor (Bbm)</option>
                <option value="B">Si Mayor (B)</option><option value="Bm">Si Menor (Bm)</option>
            </select>
        </div>
        <textarea id="lv" rows="4" placeholder="🎤 Letra Voces..."></textarea>
        <textarea id="ln" rows="4" placeholder="🎹 Letra y Notas..."></textarea>
        
        <button onclick="save()" class="btn-save">GUARDAR EN EL CELULAR 💾</button>
        <button onclick="resetForm()" style="width:100%; padding:10px; background:transparent; border:none; color:#888; cursor:pointer;">Cancelar</button>
    </div>

    <!-- Buscador Global -->
    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Buscar canción o letra..." oninput="draw()">
    </div>

    <!-- Filtro de Ritmo -->
    <div class="filter-group">
        <button id="br" class="f-btn" onclick="setR('rapida')">🏍️ Rápidas</button>
        <button id="bl" class="f-btn" onclick="setR('lenta')">🐢 Lentas</button>
    </div>

    <div id="main-list"></div>

    <!-- Gestión de Copias de Seguridad (Siempre visible abajo) -->
    <div class="backup-bar">
        <div class="backup-title">📦 Copia de seguridad / Archivos JSON</div>
        <div class="backup-group">
            <button class="btn-backup" onclick="exportData()">📥 Guardar Copia</button>
            <button class="btn-backup" onclick="document.getElementById('import-file').click()">📤 Importar Canciones</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)" accept=".json">
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('mis_canciones')) || [];
    let filterR = '';
    let scrollInterval = null;

    const scale = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "Ab", "A", "Bb", "B"];

    function save() {
        const id = document.getElementById('edit-id').value;
        const t = document.getElementById('t').value.trim();
        const r = document.getElementById('r').value;
        const ton = document.getElementById('ton').value;
        const lv = document.getElementById('lv').value;
        const ln = document.getElementById('ln').value;

        if(!t) return alert("Escribe un título");

        if(id) {
            const index = data.findIndex(c => c.id == id);
            if(index !== -1) {
                data[index] = { id: Number(id), titulo: t, ritmo: r, tonalidad: ton, letraVoces: lv, letraNotas: ln };
            }
        } else {
            const nueva = { id: Date.now(), titulo: t, ritmo: r, tonalidad: ton, letraVoces: lv, letraNotas: ln };
            data.push(nueva);
        }

        localStorage.setItem('mis_canciones', JSON.stringify(data));
        resetForm();
        draw();
    }

    function editSong(id) {
        const c = data.find(item => item.id === id);
        if(!c) return;
        
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('panel-title').innerText = 'Editar Canción';
        document.getElementById('edit-id').value = c.id;
        document.getElementById('t').value = c.titulo;
        document.getElementById('r').value = c.ritmo;
        document.getElementById('ton').value = c.tonalidad;
        document.getElementById('lv').value = c.letraVoces || '';
        document.getElementById('ln').value = c.letraNotas || '';
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('t').value = '';
        document.getElementById('lv').value = '';
        document.getElementById('ln').value = '';
        document.getElementById('panel-title').innerText = 'Añadir Canción';
        document.getElementById('admin-panel').style.display = 'none';
    }

    function deleteSong(id) {
        if(confirm("¿Eliminar esta canción?")) {
            data = data.filter(c => c.id !== id);
            localStorage.setItem('mis_canciones', JSON.stringify(data));
            draw();
        }
    }

    function setR(r) {
        filterR = (filterR === r) ? '' : r;
        draw();
    }

    function transposeChord(chord, semitones) {
        return chord.replace(/[A-G][b#]?/g, function(match) {
            let i = scale.indexOf(match);
            if (i === -1) {
                const altMap = { "Db":"C#", "D#":"Eb", "Gb":"F#", "G#":"Ab", "A#":"Bb" };
                i = scale.indexOf(altMap[match] || match);
            }
            if (i === -1) return match;
            let newIndex = (i + semitones) % 12;
            return scale[newIndex < 0 ? newIndex + 12 : newIndex];
        });
    }

    function changeKey(btn, semitones) {
        const itemContent = btn.closest('.item-content');
        const notesArea = itemContent.querySelector('.text-area.n');
        let currentText = notesArea.innerText;
        
        let transposed = currentText.replace(/\[(.*?)\]/g, (m, p1) => `[${transposeChord(p1, semitones)}]`);
        notesArea.innerText = transposed;
    }

    function toggleScroll(btn) {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
            btn.innerText = '📜 Scroll: OFF';
            btn.style.background = '#222636';
        } else {
            btn.innerText = '📜 Scroll: ON';
            btn.style.background = 'var(--green)';
            scrollInterval = setInterval(() => {
                window.scrollBy(0, 1);
            }, 50);
        }
    }

    function changeFontSize(btn, delta) {
        const itemContent = btn.closest('.item-content');
        const areas = itemContent.querySelectorAll('.text-area');
        areas.forEach(a => {
            let current = parseFloat(window.getComputedStyle(a).fontSize);
            a.style.fontSize = (current + delta) + 'px';
        });
    }

    function draw() {
        const list = document.getElementById('main-list');
        const query = document.getElementById('search').value.toLowerCase().trim();
        list.innerHTML = '';
        
        document.getElementById('br').classList.toggle('active', filterR === 'rapida');
        document.getElementById('bl').classList.toggle('active', filterR === 'lenta');

        let filtered = data.filter(c => {
            const matchesRitmo = filterR === '' || c.ritmo === filterR;
            const matchesSearch = query === '' || 
                c.titulo.toLowerCase().includes(query) || 
                (c.letraVoces && c.letraVoces.toLowerCase().includes(query)) ||
                (c.letraNotas && c.letraNotas.toLowerCase().includes(query));
            return matchesRitmo && matchesSearch;
        });

        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-state">${query ? 'No se encontraron resultados.' : 'Selecciona un ritmo o busca una canción...'}</div>`;
            return;
        }

        const groups = filtered.reduce((acc, c) => {
            let t = c.tonalidad || "C";
            acc[t] = acc[t] || [];
            acc[t].push(c);
            return acc;
        }, {});

        Object.keys(groups).sort().forEach(ton => {
            const div = document.createElement('div');
            div.className = 'tono-box' + (query !== '' ? ' open' : '');
            div.innerHTML = `<div class="tono-title" onclick="this.parentElement.classList.toggle('open')"><span>🎶 Tono: ${ton}</span> <span>${groups[ton].length} ▾</span></div><div class="cancion-list"></div>`;
            const cList = div.querySelector('.cancion-list');
            
            groups[ton].forEach(c => {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `
                    <div class="actions-btn">
                        <button class="btn-action btn-edit" onclick="editSong(${c.id})">✏️</button>
                        <button class="btn-action btn-del" onclick="deleteSong(${c.id})">🗑️</button>
                    </div>
                    <div class="item-head" onclick="this.parentElement.classList.toggle('open')">🎵 ${c.titulo}</div>
                    <div class="item-content">
                        <div class="visor-tools">
                            <div class="tool-group">
                                <span style="font-size:11px; color:#aaa;">Tono:</span>
                                <button class="tool-btn" onclick="changeKey(this, -1)">-1</button>
                                <button class="tool-btn" onclick="changeKey(this, 1)">+1</button>
                            </div>
                            <div class="tool-group">
                                <span style="font-size:11px; color:#aaa;">Texto:</span>
                                <button class="tool-btn" onclick="changeFontSize(this, -2)">A-</button>
                                <button class="tool-btn" onclick="changeFontSize(this, 2)">A+</button>
                            </div>
                            <button class="tool-btn" onclick="toggleScroll(this)">📜 Scroll</button>
                        </div>

                        <div class="tabs">
                            <button class="t-btn active" onclick="shTab(this,'v')">Voces</button>
                            <button class="t-btn" onclick="shTab(this,'n')">Notas</button>
                        </div>
                        <div class="text-area active v">${c.letraVoces || 'Sin letra.'}</div>
                        <div class="text-area n">${c.letraNotas || 'Sin notas.'}</div>
                    </div>`;
                cList.appendChild(item);
            });
            list.appendChild(div);
        });
    }

    function shTab(btn, mode) {
        const p = btn.closest('.item-content');
        p.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        p.querySelector('.v').classList.toggle('active', mode === 'v');
        p.querySelector('.n').classList.toggle('active', mode === 'n');
    }

    function checkAdmin() { 
        if(prompt("Clave:") === "ipuc") {
            resetForm();
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `letras_respaldo_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const imported = JSON.parse(evt.target.result);
                if(Array.isArray(imported)) {
                    // Combinar o reemplazar datos
                    data = imported;
                    localStorage.setItem('mis_canciones', JSON.stringify(data));
                    draw();
                    alert("¡Canciones cargadas con éxito!");
                }
            } catch(err) {
                alert("Archivo JSON no válido.");
            }
        };
        reader.readAsText(file);
    }

    draw();
</script>
</body>
</html>
